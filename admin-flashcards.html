<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
  <link rel="icon" href="/images/emblem-pbm.png" type="image/png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#C0270F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PBM">
<link rel="apple-touch-icon" href="/images/pwa-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocolo Bravo Mike — Flashcards (Admin)</title>
<script src="/js/pbm-theme-boot.js"></script>
<link rel="stylesheet" href="/css/pbm-tokens.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/admin-chrome.css">
<style>
  .filtros { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .filtro-select { background: var(--cinza-escuro); border: 1px solid var(--cinza-borda); color: var(--branco); border-radius: 8px; padding: 8px 12px; font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; outline: none; }
  .filtro-select:focus { border-color: var(--roxo); }
  .filtro-busca { flex: 1; min-width: 180px; background: var(--cinza-escuro); border: 1px solid var(--cinza-borda); color: var(--branco); border-radius: 8px; padding: 8px 12px; font-family: 'Inter', sans-serif; font-size: 13px; outline: none; }
  .filtro-busca:focus { border-color: var(--roxo); }
  .filtro-busca::placeholder { color: #555; }

  .lista-header { display: grid; grid-template-columns: minmax(0, 1fr) 80px 60px 80px 60px 110px; gap: 1rem; padding: 8px 1rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--cinza-borda); margin-bottom: 4px; }
  .card-row { display: grid; grid-template-columns: minmax(0, 1fr) 80px 60px 80px 60px 110px; gap: 1rem; align-items: center; background: var(--cinza-escuro); border: 1px solid var(--cinza-borda); border-radius: 8px; padding: 12px 1rem; margin-bottom: 6px; transition: border-color 0.15s; }
  .card-row:hover { border-color: #444; }
  .card-frente { font-size: 13px; color: var(--branco); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-leg { font-size: 11px; color: var(--cinza-texto); margin-top: 2px; font-family: 'IBM Plex Mono', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-area-badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; display: inline-block; }
  .badge-AT1 { background: rgba(192,39,15,0.12); color: #E0866E; border: 1px solid rgba(192,39,15,0.3); }
  .badge-AT2 { background: rgba(186,117,23,0.12); color: #EF9F27; border: 1px solid rgba(186,117,23,0.3); }
  .badge-AT3 { background: rgba(24,95,165,0.12); color: #85B7EB; border: 1px solid rgba(24,95,165,0.3); }
  .badge-AT4 { background: rgba(39,160,90,0.12); color: #7DD99A; border: 1px solid rgba(39,160,90,0.3); }
  .badge-AT5 { background: rgba(127,119,221,0.12); color: #AFA9EC; border: 1px solid rgba(127,119,221,0.3); }
  .fonte-badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 2px 7px; border-radius: 20px; }
  .fonte-ia { background: rgba(127,119,221,0.08); border: 1px solid rgba(127,119,221,0.2); color: #AFA9EC; }
  .fonte-manual { background: rgba(39,160,90,0.08); border: 1px solid rgba(39,160,90,0.2); color: #7DD99A; }
  .card-status { display: inline-flex; align-items: center; gap: 5px; font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 20px; }
  .status-ativa { background: var(--verde-bg); border: 1px solid var(--verde-borda); color: #7DD99A; }
  .status-inativa { background: rgba(226,75,74,0.08); border: 1px solid rgba(226,75,74,0.2); color: #F09595; }
  .card-acoes { display: flex; gap: 6px; justify-content: flex-end; }
  .btn-mini { background: transparent; border: 1px solid var(--cinza-borda); color: var(--cinza-texto); border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.12s; }
  .btn-mini:hover { border-color: #555; color: var(--branco); }
  .btn-mini.danger:hover { border-color: var(--erro); color: #F09595; }
  .btn-mini.edit:hover { border-color: var(--roxo); color: #AFA9EC; }

  .vazio { text-align: center; padding: 4rem 2rem; color: var(--cinza-texto); }
  .loading-txt { text-align: center; padding: 3rem; color: var(--cinza-texto); font-size: 13px; }
  .total-txt { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--cinza-texto); margin-bottom: 1rem; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: center; justify-content: center; padding: 1rem; }
  .overlay.aberto { display: flex; }
  .modal { background: var(--cinza-escuro); border: 1px solid var(--cinza-borda); border-radius: 12px; width: 100%; max-width: 600px; max-height: 90vh; display: flex; flex-direction: column; }
  .modal-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--cinza-borda); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .modal-titulo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.03em; }
  .modal-fechar { background: transparent; border: none; color: var(--cinza-texto); font-size: 20px; cursor: pointer; padding: 0 4px; transition: color 0.15s; }
  .modal-fechar:hover { color: var(--branco); }
  .modal-body { padding: 1.5rem; overflow-y: auto; flex: 1; }
  .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--cinza-borda); display: flex; gap: 10px; justify-content: flex-end; flex-shrink: 0; }

  .campo { margin-bottom: 1rem; }
  .campo label { display: block; font-size: 11px; font-weight: 500; color: var(--cinza-texto); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
  .campo input, .campo select, .campo textarea { width: 100%; background: var(--cinza-medio); border: 1px solid var(--cinza-borda); border-radius: 8px; padding: 9px 12px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--branco); outline: none; transition: border-color 0.2s; }
  .campo input:focus, .campo select:focus, .campo textarea:focus { border-color: var(--roxo); }
  .campo input::placeholder, .campo textarea::placeholder { color: #555; }
  .campo textarea { resize: vertical; min-height: 90px; }
  .campo select option { background: var(--cinza-medio); }

  .btn-salvar { background: var(--roxo); color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s; }
  .btn-salvar:hover { background: #6960C8; }
  .btn-salvar:disabled { background: #444; cursor: default; }
  .btn-cancelar { background: transparent; border: 1px solid var(--cinza-borda); color: var(--cinza-texto); border-radius: 8px; padding: 10px 24px; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
  .btn-cancelar:hover { border-color: #555; color: var(--branco); }

  @media (max-width: 768px) {
    .lista-header { display: none; }
    .card-row { grid-template-columns: 1fr auto; }
    .card-area-badge, .fonte-badge, .card-status { display: none; }
  }
</style>
</head>
<body>

<script src="/js/api.js"></script>
<script src="/js/admin-chrome.js"></script>
<script>
const _isAdmin = PBM.isAdmin();
</script>

<div class="layout">
  <aside id="admin-chrome"></aside>

  <div class="main">
    <header id="admin-topbar"></header>

    <div class="conteudo">
      <div class="filtros">
        <select class="filtro-select" id="filtro-area">
          <option value="">Todas as áreas</option>
          <option value="AT1">AT1 — Segurança contra incêndios</option>
          <option value="AT2">AT2 — Combate a incêndios</option>
          <option value="AT3">AT3 — Buscas e salvamentos / APH</option>
          <option value="AT4">AT4 — Direito institucional e militar</option>
          <option value="AT5">AT5 — Normas e documentação técnica</option>
        </select>
        <select class="filtro-select" id="filtro-curso">
          <option value="">Todos os cursos</option>
          <option value="ctsp">CTSP</option>
          <option value="cba">CBA</option>
          <option value="ambos">Ambos</option>
        </select>
        <select class="filtro-select" id="filtro-fonte">
          <option value="">Todas as fontes</option>
          <option value="ia">Gerado por IA</option>
          <option value="manual">Manual</option>
        </select>
        <select class="filtro-select" id="filtro-status">
          <option value="">Todos</option>
          <option value="true">Ativos</option>
          <option value="false">Inativos</option>
        </select>
        <input class="filtro-busca" type="text" id="filtro-busca" placeholder="Buscar frente ou legislação…">
      </div>

      <div class="total-txt" id="total-txt">Carregando…</div>

      <div class="lista-header">
        <div>Flashcard</div>
        <div>Área</div>
        <div>Curso</div>
        <div>Fonte</div>
        <div>Status</div>
        <div style="text-align:right">Ações</div>
      </div>

      <div id="lista-cards"><div class="loading-txt">Carregando flashcards…</div></div>
    </div>
  </div>
</div>

<!-- MODAL CRIAR / EDITAR -->
<div class="overlay" id="overlay-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-titulo" id="modal-titulo">Novo Flashcard</span>
      <button class="modal-fechar" id="btn-fechar-modal">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="modal-id">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="campo">
          <label>Área Temática</label>
          <select id="m-area">
            <option value="AT1">AT1 — Segurança contra incêndios</option>
            <option value="AT2">AT2 — Combate a incêndios</option>
            <option value="AT3">AT3 — Buscas e salvamentos / APH</option>
            <option value="AT4">AT4 — Direito institucional e militar</option>
            <option value="AT5">AT5 — Normas e documentação técnica</option>
          </select>
        </div>
        <div class="campo">
          <label>Curso</label>
          <select id="m-curso">
            <option value="ambos">Ambos (CTSP e CBA)</option>
            <option value="ctsp">Somente CTSP</option>
            <option value="cba">Somente CBA</option>
          </select>
        </div>
      </div>
      <div class="campo">
        <label>Frente (pergunta / conceito)</label>
        <textarea id="m-frente" rows="3" placeholder="O que aparece na frente do card…"></textarea>
      </div>
      <div class="campo">
        <label>Verso (resposta)</label>
        <textarea id="m-verso" rows="4" placeholder="Resposta completa e precisa…"></textarea>
      </div>
      <div class="campo">
        <label>Referência / Legislação</label>
        <input type="text" id="m-legislacao" placeholder="Ex: RT CBMRS nº 05 — Parte 06/2025 (Fiscalização)">
      </div>
      <div class="campo">
        <label>Status</label>
        <select id="m-ativa">
          <option value="true">Ativo</option>
          <option value="false">Inativo</option>
        </select>
      </div>
      <div id="modal-erro" style="font-size:12px;color:#F09595;margin-top:4px;display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancelar" id="btn-cancelar-modal">Cancelar</button>
      <button class="btn-salvar" id="btn-salvar">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL DELETE -->
<div class="overlay" id="overlay-delete">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <span class="modal-titulo" style="color:#F09595">Excluir Flashcard</span>
      <button class="modal-fechar" id="btn-fechar-delete">×</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--cinza-texto);line-height:1.7">Tem certeza que deseja excluir este flashcard? Esta ação não pode ser desfeita.</p>
      <p style="font-size:12px;margin-top:1rem;color:#F09595;background:rgba(226,75,74,0.08);border:1px solid rgba(226,75,74,0.2);padding:10px;border-radius:6px" id="delete-preview"></p>
    </div>
    <div class="modal-footer">
      <button class="btn-cancelar" id="btn-cancelar-delete">Cancelar</button>
      <button class="btn-salvar" id="btn-confirmar-delete" style="background:var(--erro)">Excluir</button>
    </div>
  </div>
</div>

<script>
let todosCards = [];
let deleteId = null;

function supaFetch(path, method = 'GET', body = null) {
  return PBM.Admin.query(path, 'return=representation', method, body);
}

async function carregarCards() {
  const r = await supaFetch('/rest/v1/flashcards?select=*&order=criado_em.desc&limit=1000');
  if (r.ok && Array.isArray(r.data)) {
    todosCards = r.data;
    aplicarFiltros();
  } else {
    document.getElementById('lista-cards').innerHTML = '<div class="loading-txt" style="color:#F09595">Erro ao carregar flashcards.</div>';
  }
}

function aplicarFiltros() {
  const area   = document.getElementById('filtro-area').value;
  const curso  = document.getElementById('filtro-curso').value;
  const fonte  = document.getElementById('filtro-fonte').value;
  const status = document.getElementById('filtro-status').value;
  const busca  = document.getElementById('filtro-busca').value.toLowerCase();

  let filtrados = todosCards.filter(c => {
    if (area   && c.area !== area) return false;
    if (curso  && c.curso !== curso) return false;
    if (fonte  && c.fonte !== fonte) return false;
    if (status !== '' && String(c.ativa) !== status) return false;
    if (busca  && !c.frente.toLowerCase().includes(busca) && !c.legislacao?.toLowerCase().includes(busca)) return false;
    return true;
  });

  document.getElementById('total-txt').textContent = filtrados.length + ' flashcard' + (filtrados.length !== 1 ? 's' : '') + ' encontrado' + (filtrados.length !== 1 ? 's' : '');
  renderLista(filtrados);
}

function renderLista(cards) {
  const el = document.getElementById('lista-cards');
  if (!cards.length) {
    el.innerHTML = '<div class="vazio">Nenhum flashcard encontrado</div>';
    return;
  }
  el.innerHTML = cards.map(c => {
    const frente = c.frente.length > 80 ? c.frente.substring(0, 80) + '…' : c.frente;
    const frenteEsc = frente.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    return `
    <div class="card-row" id="row-${c.id}">
      <div>
        <div class="card-frente" title="${c.frente.replace(/"/g,'&quot;')}">${frenteEsc}</div>
        <div class="card-leg">${c.legislacao || '—'}</div>
      </div>
      <div><span class="card-area-badge badge-${c.area}">${c.area}</span></div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#888">${(c.curso||'').toUpperCase()}</div>
      <div><span class="fonte-badge fonte-${c.fonte||'manual'}">${c.fonte === 'ia' ? 'IA' : 'Manual'}</span></div>
      <div><span class="card-status ${c.ativa ? 'status-ativa' : 'status-inativa'}">${c.ativa ? 'Ativo' : 'Inativo'}</span></div>
      <div class="card-acoes">
        <button class="btn-mini edit" data-action="editar" data-id="${c.id}">Editar</button>
        ${_isAdmin ? `<button class="btn-mini danger" data-action="deletar" data-id="${c.id}" data-preview="${frenteEsc}">Excluir</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

document.getElementById('lista-cards').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  if (btn.dataset.action === 'editar')  abrirModalEditar(btn.dataset.id);
  if (btn.dataset.action === 'deletar') pedirDelete(btn.dataset.id, btn.dataset.preview || '');
});

function abrirModalNova() {
  document.getElementById('modal-titulo').textContent = 'Novo Flashcard';
  document.getElementById('modal-id').value = '';
  document.getElementById('m-frente').value = '';
  document.getElementById('m-verso').value = '';
  document.getElementById('m-legislacao').value = '';
  document.getElementById('m-area').value = 'AT1';
  document.getElementById('m-curso').value = 'ambos';
  document.getElementById('m-ativa').value = 'true';
  document.getElementById('modal-erro').style.display = 'none';
  document.getElementById('overlay-modal').classList.add('aberto');
}

function abrirModalEditar(id) {
  const c = todosCards.find(x => String(x.id) === String(id));
  if (!c) return;
  document.getElementById('modal-titulo').textContent = 'Editar Flashcard';
  document.getElementById('modal-id').value = c.id;
  document.getElementById('m-frente').value = c.frente || '';
  document.getElementById('m-verso').value = c.verso || '';
  document.getElementById('m-legislacao').value = c.legislacao || '';
  document.getElementById('m-area').value = c.area || 'AT1';
  document.getElementById('m-curso').value = c.curso || 'ambos';
  document.getElementById('m-ativa').value = String(c.ativa !== false);
  document.getElementById('modal-erro').style.display = 'none';
  document.getElementById('overlay-modal').classList.add('aberto');
}

function fecharModal() { document.getElementById('overlay-modal').classList.remove('aberto'); }

async function salvarCard() {
  const btn = document.getElementById('btn-salvar');
  const erroEl = document.getElementById('modal-erro');
  erroEl.style.display = 'none';

  const id     = document.getElementById('modal-id').value;
  const frente = document.getElementById('m-frente').value.trim();
  const verso  = document.getElementById('m-verso').value.trim();

  if (!frente || !verso) {
    erroEl.textContent = 'Preencha a frente e o verso do flashcard.';
    erroEl.style.display = 'block';
    return;
  }

  const payload = {
    frente,
    verso,
    area:      document.getElementById('m-area').value,
    curso:     document.getElementById('m-curso').value,
    legislacao: document.getElementById('m-legislacao').value.trim() || null,
    ativa:     document.getElementById('m-ativa').value === 'true',
    fonte:     id ? undefined : 'manual',
  };
  if (!id) payload.fonte = 'manual';

  btn.disabled = true;
  btn.textContent = 'Salvando…';

  let r;
  if (id) {
    r = await supaFetch('/rest/v1/flashcards?id=eq.' + id, 'PATCH', payload);
  } else {
    r = await supaFetch('/rest/v1/flashcards', 'POST', [payload]);
  }

  btn.disabled = false;
  btn.textContent = 'Salvar';

  if (r.ok) {
    fecharModal();
    await carregarCards();
  } else {
    erroEl.textContent = r.data?.message || 'Erro ao salvar. Tente novamente.';
    erroEl.style.display = 'block';
  }
}

function pedirDelete(id, preview) {
  deleteId = id;
  document.getElementById('delete-preview').textContent = preview;
  document.getElementById('overlay-delete').classList.add('aberto');
}
function fecharDelete() { document.getElementById('overlay-delete').classList.remove('aberto'); deleteId = null; }

async function confirmarDelete() {
  if (!deleteId) return;
  const btn = document.getElementById('btn-confirmar-delete');
  btn.disabled = true;
  btn.textContent = 'Excluindo…';
  await supaFetch('/rest/v1/flashcards?id=eq.' + deleteId, 'DELETE');
  btn.disabled = false;
  btn.textContent = 'Excluir';
  fecharDelete();
  await carregarCards();
}

AdminChrome.init({
  pagina: 'flashcards',
  titulo: 'Gestão de Flashcards',
  acoes: [
    {
      texto: 'Novo Flashcard',
      variant: 'primary',
      icon: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
      onClick: abrirModalNova,
    },
  ],
});

document.getElementById('btn-fechar-modal').addEventListener('click', fecharModal);
document.getElementById('btn-cancelar-modal').addEventListener('click', fecharModal);
document.getElementById('btn-salvar').addEventListener('click', salvarCard);
document.getElementById('btn-fechar-delete').addEventListener('click', fecharDelete);
document.getElementById('btn-cancelar-delete').addEventListener('click', fecharDelete);
document.getElementById('btn-confirmar-delete').addEventListener('click', confirmarDelete);

['filtro-area','filtro-curso','filtro-fonte','filtro-status'].forEach(id => {
  document.getElementById(id).addEventListener('change', aplicarFiltros);
});
document.getElementById('filtro-busca').addEventListener('input', aplicarFiltros);

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { fecharModal(); fecharDelete(); }
});

const linkModoAluno = document.getElementById('link-modo-aluno');
if (linkModoAluno) {
  linkModoAluno.addEventListener('click', function(e) {
    e.preventDefault();
    sessionStorage.setItem('usuario', JSON.stringify({ nome: 'Aluno Teste', email: 'teste@protocolobravomike.com.br', ativo: true, plano: 'mensal' }));
    sessionStorage.setItem('token', 'admin-preview-token');
    window.location.href = '/area-estudos';
  });
}

carregarCards();
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});</script>
</body>
</html>
