<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/images/emblem-pbm.png" type="image/png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#C0270F">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocolo Bravo Mike — Videoaulas (Admin)</title>
<script src="/js/font-size.js"></script>
<script src="/js/pbm-theme-boot.js?v=2"></script>
<link rel="stylesheet" href="/css/pbm-tokens.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/admin-chrome.css">
<style>
  .filtros { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .filtro-select, .filtro-busca { background: var(--cinza-escuro); border: 1px solid var(--cinza-borda); color: var(--branco); border-radius: 8px; padding: 8px 12px; font-family: 'Inter', sans-serif; font-size: 13px; outline: none; }
  .filtro-busca { flex: 1; min-width: 180px; }
  .filtro-busca::placeholder { color: #555; }
  .filtro-select:focus, .filtro-busca:focus { border-color: var(--roxo); }

  .lista-header, .card-row { display: grid; grid-template-columns: minmax(0,1fr) 70px 96px 90px 200px; gap: 1rem; align-items: center; }
  .lista-header { padding: 8px 1rem; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--cinza-borda); margin-bottom: 4px; }
  .card-row { background: var(--cinza-escuro); border: 1px solid var(--cinza-borda); border-radius: 8px; padding: 12px 1rem; margin-bottom: 6px; transition: border-color 0.15s; }
  .card-row:hover { border-color: #444; }
  .pod-titulo { font-size: 13px; color: var(--branco); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pod-leg { font-size: 11px; color: var(--cinza-texto); margin-top: 2px; font-family: 'IBM Plex Mono', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pill { font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 20px; display: inline-block; }
  .yt-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #85B7EB; text-decoration: none; }
  .yt-link:hover { text-decoration: underline; }
  .status-publicado { background: var(--verde-bg); border: 1px solid var(--verde-borda); color: var(--success-fg); }
  .status-rascunho  { background: rgba(186,117,23,0.10); border: 1px solid rgba(186,117,23,0.3); color: #EF9F27; }
  .card-acoes { display: flex; gap: 6px; justify-content: flex-end; flex-wrap: wrap; }
  .btn-mini { background: transparent; border: 1px solid var(--cinza-borda); color: var(--cinza-texto); border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.12s; }
  .btn-mini:hover { border-color: #555; color: var(--branco); }
  .btn-mini.danger:hover { border-color: var(--erro); color: var(--danger-fg); }
  .btn-mini.ok:hover { border-color: var(--verde-borda); color: var(--success-fg); }
  .btn-mini.edit:hover { border-color: var(--roxo); color: #AFA9EC; }
  .btn-mini:disabled { opacity: 0.4; cursor: default; }

  .vazio, .loading-txt { text-align: center; padding: 3rem; color: var(--cinza-texto); font-size: 13px; }
  .total-txt { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--cinza-texto); margin-bottom: 1rem; }

  /* Série no admin: vídeos da mesma lei agrupados num acordeão (colapsado por padrão). */
  .serie-admin { margin-bottom: 8px; }
  .serie-admin-head { display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; background: var(--cinza-escuro); border: 1px solid var(--cinza-borda); border-radius: 8px; padding: 12px 1rem; transition: border-color 0.15s; }
  .serie-admin-head:hover { border-color: #444; }
  .serie-admin-chevron { font-size: 14px; line-height: 1; color: var(--cinza-texto); transition: transform 0.2s; flex: none; }
  .serie-admin.colapsada .serie-admin-chevron { transform: rotate(-90deg); }
  .serie-admin-nome { font-size: 13px; font-weight: 600; color: var(--branco); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .serie-admin-count { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--cinza-texto); border: 1px solid var(--cinza-borda); border-radius: 20px; padding: 3px 8px; flex: none; }
  .serie-add { flex: none; }
  .serie-admin-eps { margin-top: 6px; padding-left: 8px; }
  .serie-admin.colapsada .serie-admin-eps { display: none; }
  .at-titulo-admin { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: #888; margin: 20px 2px 8px; padding-bottom: 6px; border-bottom: 1px solid var(--cinza-borda); }
  .at-titulo-admin:first-child { margin-top: 0; }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: none; align-items: flex-start; justify-content: center; padding: 1rem; overflow-y: auto; }
  .overlay.aberto { display: flex; }
  .modal { background: var(--cinza-escuro); border: 1px solid var(--cinza-borda); border-radius: 12px; width: 100%; max-width: 640px; max-height: 92vh; margin: auto; display: flex; flex-direction: column; }
  .modal-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--cinza-borda); display: flex; align-items: center; justify-content: space-between; }
  .modal-titulo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.03em; }
  .modal-fechar { background: transparent; border: none; color: var(--cinza-texto); font-size: 20px; cursor: pointer; }
  .modal-fechar:hover { color: var(--branco); }
  .modal-body { padding: 1.5rem; overflow-y: auto; }
  .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--cinza-borda); display: flex; gap: 10px; justify-content: flex-end; }
  .campo { margin-bottom: 1rem; }
  .campo label { display: block; font-size: 11px; font-weight: 500; color: var(--cinza-texto); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
  .campo input, .campo select, .campo textarea { width: 100%; background: var(--cinza-medio); border: 1px solid var(--cinza-borda); border-radius: 8px; padding: 9px 12px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--branco); outline: none; }
  .campo textarea { min-height: 70px; resize: vertical; }
  .campo input:focus, .campo select:focus, .campo textarea:focus { border-color: var(--roxo); }
  .campo input::placeholder, .campo textarea::placeholder { color: #555; }
  .campo-aviso { font-size: 11px; color: var(--cinza-texto); margin-top: 4px; }
  .leg-info { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #FFA500; margin-top: 6px; display: block; }
  .yt-preview { margin-top: 8px; border-radius: 8px; overflow: hidden; border: 1px solid var(--cinza-borda); display: none; aspect-ratio: 16/9; }
  .yt-preview.on { display: block; }
  .yt-preview iframe { width: 100%; height: 100%; border: 0; display: block; }
  .btn-salvar { background: var(--roxo); color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
  .btn-salvar:hover { background: #6960C8; }
  .btn-salvar:disabled { background: #444; cursor: default; }
  .btn-cancelar { background: transparent; border: 1px solid var(--cinza-borda); color: var(--cinza-texto); border-radius: 8px; padding: 10px 24px; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; }
  .btn-cancelar:hover { border-color: #555; color: var(--branco); }
  #modal-erro { font-size: 12px; color: var(--danger-fg); margin-top: 4px; display: none; }

  @media (max-width: 768px) {
    .lista-header { display: none; }
    .card-row { grid-template-columns: 1fr; gap: 8px; }
    .card-acoes { justify-content: flex-start; }
  }
</style>
</head>
<body>

<script src="/js/api.js?v=6"></script>
<script src="/js/admin-chrome.js"></script>

<div class="layout">
  <aside id="admin-chrome"></aside>
  <div class="main">
    <header id="admin-topbar"></header>
    <div class="conteudo">
      <div class="filtros">
        <select class="filtro-select" id="filtro-curso">
          <option value="">Todos os cursos</option>
          <option value="ctsp">CTSP</option><option value="cba">CBA</option><option value="ambos">Ambos</option>
        </select>
        <select class="filtro-select" id="filtro-status">
          <option value="">Todos status</option>
          <option value="publicado">Publicado</option><option value="rascunho">Rascunho</option>
        </select>
        <input class="filtro-busca" type="text" id="filtro-busca" placeholder="Buscar título ou legislação…">
      </div>

      <div class="total-txt" id="total-txt">Carregando…</div>
      <div class="lista-header">
        <div>Videoaula</div><div>Curso</div><div>YouTube</div><div>Status</div>
        <div style="text-align:right">Ações</div>
      </div>
      <div id="lista"><div class="loading-txt">Carregando videoaulas…</div></div>
    </div>
  </div>
</div>

<!-- MODAL CRIAR/EDITAR -->
<div class="overlay" id="overlay-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-titulo" id="modal-titulo">Nova Videoaula</span>
      <button class="modal-fechar" id="btn-fechar-modal">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="m-id">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="campo">
          <label>Área Temática</label>
          <select id="m-area">
            <option value="">— selecione —</option>
            <option value="AT1">AT1 — Segurança contra incêndios</option>
            <option value="AT2">AT2 — Combate a incêndios</option>
            <option value="AT3">AT3 — Buscas e salvamentos / APH</option>
            <option value="AT4">AT4 — Direito institucional e militar</option>
            <option value="AT5">AT5 — Normas e documentação técnica</option>
          </select>
        </div>
        <div class="campo">
          <label>Curso</label>
          <select id="m-curso">
            <option value="ambos">Ambos (CTSP e CBA)</option>
            <option value="ctsp">Somente CTSP</option>
            <option value="cba">Somente CBA</option>
          </select>
        </div>
      </div>
      <div class="campo">
        <label>Legislação</label>
        <select id="m-legislacao-id" disabled><option value="">— escolha a área primeiro —</option></select>
        <span class="leg-info" id="leg-info"></span>
      </div>
      <div class="campo">
        <label>Link da playlist do YouTube (ou vídeo único)</label>
        <input type="text" id="m-youtube" placeholder="https://youtube.com/playlist?list=… (recomendado)">
        <div class="campo-aviso">Cole a <strong>playlist</strong> (um link só, o player navega os episódios) ou um vídeo único. Use conteúdo <strong>Não listado</strong> (não “Privado” — esse não embeda). O preview aparece abaixo.</div>
        <div class="yt-preview" id="yt-preview"><iframe id="yt-iframe" allow="encrypted-media" referrerpolicy="strict-origin-when-cross-origin"></iframe></div>
      </div>
      <div class="campo">
        <label>Título</label>
        <input type="text" id="m-titulo" placeholder="Ex.: Lei Kiss — videoaula">
      </div>
      <div class="campo">
        <label>Descrição (opcional)</label>
        <textarea id="m-descricao" placeholder="Resumo curto da aula."></textarea>
      </div>
      <div class="campo">
        <label>Capítulo (opcional)</label>
        <input type="text" id="m-capitulo" placeholder="Ex.: Cap. I–II — deixe vazio se for vídeo único">
      </div>
      <div class="campo">
        <label>Ordem na série (opcional)</label>
        <input type="number" id="m-ordem" min="0" step="1" placeholder="Ex.: 1, 2, 3… ordena os vídeos da lei">
      </div>
      <div class="campo">
        <label>Status</label>
        <select id="m-status">
          <option value="rascunho">Rascunho</option>
          <option value="publicado">Publicado</option>
        </select>
      </div>
      <div id="modal-erro"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancelar" id="btn-cancelar-modal">Cancelar</button>
      <button class="btn-salvar" id="btn-salvar">Salvar</button>
    </div>
  </div>
</div>

<script>
let todos = [];
let manifestoLegs = [];

// Extrai o id de 11 chars do YouTube de um id cru ou URL (espelha o backend).
function extrairYoutubeId(input) {
  if (!input) return null;
  const s = String(input).trim();
  if (/^[A-Za-z0-9_-]{11}$/.test(s)) return s;
  const pats = [/[?&]v=([A-Za-z0-9_-]{11})/, /youtu\.be\/([A-Za-z0-9_-]{11})/, /\/embed\/([A-Za-z0-9_-]{11})/, /\/shorts\/([A-Za-z0-9_-]{11})/, /\/live\/([A-Za-z0-9_-]{11})/];
  for (const re of pats) { const m = s.match(re); if (m) return m[1]; }
  return null;
}

// Playlist: link com list= ou id cru de playlist (espelha o backend).
function extrairPlaylistId(input) {
  if (!input) return null;
  const s = String(input).trim();
  const m = s.match(/[?&]list=([A-Za-z0-9_-]+)/);
  if (m) return m[1];
  if (/^(PL|UU|OL|FL|RD|LL|TL)[A-Za-z0-9_-]{10,}$/.test(s)) return s;
  return null;
}

async function carregarManifesto() {
  if (manifestoLegs.length) return;
  try { const r = await fetch('/api/legislacoes/manifesto'); manifestoLegs = (await r.json())?.legislacoes || []; }
  catch (e) { console.error('Erro ao carregar manifesto', e); }
}
function legPorId(id) { return manifestoLegs.find(l => l.id === id) || null; }
function atDaLeg(leg, curso) {
  if (!leg) return null;
  const at = leg.area_tematica;
  if (typeof at === 'string') return at;
  if (at && typeof at === 'object') return at[curso === 'cba' ? 'cba' : 'ctsp'] || at.ctsp || at.cba;
  return null;
}
function popularLegsPorArea(legPreservar) {
  const at = document.getElementById('m-area').value;
  const curso = document.getElementById('m-curso').value;
  const sel = document.getElementById('m-legislacao-id');
  const anterior = legPreservar || sel.value;
  if (!at) { sel.innerHTML = '<option value="">— escolha a área primeiro —</option>'; sel.disabled = true; return; }
  const filtradas = manifestoLegs
    .filter(l => atDaLeg(l, curso) === at)
    .filter(l => curso === 'ambos' ? l.curso === 'ambos' : (l.curso === curso || l.curso === 'ambos'))
    .sort((a, b) => (a.nome || '').localeCompare(b.nome || ''));
  sel.innerHTML = '<option value="">— selecione —</option>' + filtradas.map(l =>
    `<option value="${l.id}">${(l.nome || '').replace(/</g, '&lt;')}</option>`).join('');
  if (anterior && filtradas.some(l => l.id === anterior)) sel.value = anterior;
  sel.disabled = false;
}
function atualizarInfoLeg() {
  const id = document.getElementById('m-legislacao-id').value;
  const info = document.getElementById('leg-info');
  const selCurso = document.getElementById('m-curso');
  const tituloEl = document.getElementById('m-titulo');
  const leg = legPorId(id);
  if (!leg) { info.innerHTML = ''; return; }
  info.innerHTML = leg.curso === 'ambos'
    ? '⭐ Elegível para AMBOS os cursos.'
    : 'ℹ️ Edital: <strong style="color:var(--branco)">' + (leg.curso || '').toUpperCase() + '</strong>';
  if (leg.curso && selCurso.value !== leg.curso) { selCurso.value = leg.curso; popularLegsPorArea(id); }
  if (!tituloEl.value.trim()) tituloEl.value = leg.nome || '';
}

function atualizarPreview() {
  const bruto = document.getElementById('m-youtube').value;
  const box = document.getElementById('yt-preview');
  const iframe = document.getElementById('yt-iframe');
  const playlist = extrairPlaylistId(bruto);
  const id = playlist ? null : extrairYoutubeId(bruto);
  if (playlist) { iframe.src = 'https://www.youtube-nocookie.com/embed/videoseries?list=' + playlist + '&rel=0'; box.classList.add('on'); }
  else if (id) { iframe.src = 'https://www.youtube-nocookie.com/embed/' + id + '?rel=0'; box.classList.add('on'); }
  else { iframe.src = ''; box.classList.remove('on'); }
}

async function carregar() {
  try { todos = await PBM.Admin.videoaulas.listar(); todos = Array.isArray(todos) ? todos : []; aplicarFiltros(); }
  catch (e) { document.getElementById('lista').innerHTML = '<div class="loading-txt" style="color:var(--danger-fg)">Não foi possível carregar as videoaulas.</div>'; }
}
function aplicarFiltros() {
  const curso = document.getElementById('filtro-curso').value;
  const status = document.getElementById('filtro-status').value;
  const busca = document.getElementById('filtro-busca').value.toLowerCase();
  const lista = todos.filter(v => {
    if (curso && v.curso !== curso) return false;
    if (status && v.status !== status) return false;
    if (busca && !((v.titulo || '') + ' ' + (v.legislacao_id || '')).toLowerCase().includes(busca)) return false;
    return true;
  });
  const nLeis = new Set(lista.map(v => v.legislacao_id || '—')).size;
  document.getElementById('total-txt').textContent =
    lista.length + ' videoaula' + (lista.length !== 1 ? 's' : '') + ' • ' + nLeis + ' lei' + (nLeis !== 1 ? 's' : '');
  // Busca/filtro ativo => abre os grupos pra os resultados ficarem visíveis.
  render(lista, !!(busca || curso || status));
}

function nomeLei(legId) {
  const leg = legPorId(legId);
  return (leg && leg.nome) || legId || '—';
}

// Agrupa por legislação e ordena cada série por `ordem` (depois título).
function agruparPorLei(lista) {
  const grupos = new Map();
  lista.forEach(v => {
    const chave = v.legislacao_id || '—';
    if (!grupos.has(chave)) grupos.set(chave, []);
    grupos.get(chave).push(v);
  });
  return [...grupos.entries()].map(([legId, eps]) => {
    eps.sort((a, b) => {
      const oa = a.ordem == null ? Infinity : a.ordem;
      const ob = b.ordem == null ? Infinity : b.ordem;
      return oa !== ob ? oa - ob : (a.titulo || '').localeCompare(b.titulo || '');
    });
    return [legId, eps];
  }).sort((a, b) => nomeLei(a[0]).localeCompare(nomeLei(b[0])));
}

function linhaEpisodio(v) {
  const stClass = v.status === 'publicado' ? 'status-publicado' : 'status-rascunho';
  const ordemTag = v.ordem != null ? '#' + v.ordem + ' · ' : '';
  return `
    <div class="card-row">
      <div>
        <div class="pod-titulo">${ordemTag}${(v.titulo || '—').replace(/</g, '&lt;')}</div>
        <div class="pod-leg">${(v.capitulo || v.legislacao_id || '—').replace(/</g, '&lt;')}</div>
      </div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#888">${(v.curso || '').toUpperCase()}</div>
      <div>${v.youtube_playlist_id
        ? `<a class="yt-link" href="https://www.youtube.com/playlist?list=${encodeURIComponent(v.youtube_playlist_id)}" target="_blank" rel="noopener">playlist ↗</a>`
        : `<a class="yt-link" href="https://youtu.be/${encodeURIComponent(v.youtube_id || '')}" target="_blank" rel="noopener">${(v.youtube_id || '—')}↗</a>`}</div>
      <div><span class="pill ${stClass}">${v.status || '—'}</span></div>
      <div class="card-acoes">
        <button class="btn-mini ok" data-action="publicar" data-id="${v.id}" ${v.status !== 'publicado' ? '' : 'disabled'}>Publicar</button>
        <button class="btn-mini edit" data-action="editar" data-id="${v.id}">Editar</button>
        <button class="btn-mini danger" data-action="excluir" data-id="${v.id}">Excluir</button>
      </div>
    </div>`;
}

// ── Área Temática (mesma divisão do resto do site) ───────────────────────────
const AT_LABEL = {
  AT1: 'AT1 — Segurança contra incêndios',
  AT2: 'AT2 — Combate a incêndios',
  AT3: 'AT3 — Buscas e salvamentos / APH',
  AT4: 'AT4 — Direito institucional e militar',
  AT5: 'AT5 — Normas e documentação técnica',
};
const AT_ORDEM = ['AT1', 'AT2', 'AT3', 'AT4', 'AT5'];
function rotuloAT(at) { return AT_LABEL[at] || 'Outras legislações'; }
function atDaLei(legId, eps) { return atDaLeg(legPorId(legId), eps[0] && eps[0].curso) || 'OUTROS'; }

function serieAdminHTML(legId, eps, expandir) {
  const legAttr = String(legId).replace(/"/g, '&quot;');
  return `
    <section class="serie-admin${expandir ? '' : ' colapsada'}" data-leg="${legAttr}">
      <div class="serie-admin-head" data-action="toggle-serie">
        <span class="serie-admin-chevron">⌄</span>
        <span class="serie-admin-nome">${nomeLei(legId).replace(/</g, '&lt;')}</span>
        <span class="serie-admin-count">${eps.length} ep${eps.length !== 1 ? 's' : ''}</span>
        <button class="btn-mini edit serie-add" data-action="add-ep" data-leg="${legAttr}">+ Episódio</button>
      </div>
      <div class="serie-admin-eps">${eps.map(linhaEpisodio).join('')}</div>
    </section>`;
}

function render(lista, expandir) {
  const el = document.getElementById('lista');
  if (!lista.length) { el.innerHTML = '<div class="vazio">Nenhuma videoaula encontrada</div>'; return; }
  // Agrupa lei -> AT; cada AT vira um cabeçalho com suas séries (como no resto do site).
  const buckets = new Map();
  agruparPorLei(lista).forEach(([legId, eps]) => {
    const at = atDaLei(legId, eps);
    if (!buckets.has(at)) buckets.set(at, []);
    buckets.get(at).push([legId, eps]);
  });
  const ats = [...buckets.keys()].sort((a, b) => {
    const ia = AT_ORDEM.indexOf(a), ib = AT_ORDEM.indexOf(b);
    return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
  });
  el.innerHTML = ats.map((at) => {
    const secoes = buckets.get(at).map(([legId, eps]) => serieAdminHTML(legId, eps, expandir)).join('');
    return `<div class="at-titulo-admin">${rotuloAT(at)}</div>${secoes}`;
  }).join('');
}

document.getElementById('lista').addEventListener('click', (e) => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  if (btn.dataset.action === 'toggle-serie') { btn.closest('.serie-admin').classList.toggle('colapsada'); return; }
  if (btn.dataset.action === 'add-ep') { abrirModalNovoNaLei(btn.dataset.leg); return; }
  const id = btn.dataset.id;
  if (btn.dataset.action === 'editar') abrirModalEditar(id);
  if (btn.dataset.action === 'excluir') excluir(id);
  if (btn.dataset.action === 'publicar') publicar(id);
});

async function publicar(id) {
  try { await PBM.Admin.videoaulas.publicar(id); AdminChrome.toast('Videoaula publicada.', 'sucesso'); await carregar(); }
  catch (err) { AdminChrome.toast(err?.erro || 'Falha ao publicar. Tente novamente.', 'erro'); }
}
async function excluir(id) {
  const v = todos.find(x => String(x.id) === String(id));
  if (!confirm('Excluir a videoaula "' + (v?.titulo || id) + '"? (O vídeo no YouTube não é afetado.)')) return;
  try { await PBM.Admin.videoaulas.excluir(id); AdminChrome.toast('Videoaula excluída.', 'sucesso'); await carregar(); }
  catch (err) { AdminChrome.toast(err?.erro || 'Falha ao excluir. Tente novamente.', 'erro'); }
}

async function abrirModalNovo() {
  await carregarManifesto();
  document.getElementById('modal-titulo').textContent = 'Nova Videoaula';
  ['m-id', 'm-titulo', 'm-descricao', 'm-youtube', 'm-capitulo', 'm-ordem'].forEach(i => document.getElementById(i).value = '');
  document.getElementById('m-area').value = '';
  document.getElementById('m-curso').value = 'ambos';
  popularLegsPorArea('');
  document.getElementById('leg-info').innerHTML = '';
  document.getElementById('m-status').value = 'rascunho';
  atualizarPreview();
  document.getElementById('modal-erro').style.display = 'none';
  document.getElementById('overlay-modal').classList.add('aberto');
}
// Quick-add: nova videoaula JÁ na lei do grupo, com área/curso/legislação preenchidos
// e a Ordem auto-incrementada (próximo número da série). Otimiza o trabalho repetitivo.
async function abrirModalNovoNaLei(legId) {
  await carregarManifesto();
  const leg = legPorId(legId);
  const eps = todos.filter(v => v.legislacao_id === legId);
  const maxOrdem = eps.reduce((m, v) => (v.ordem != null && v.ordem > m ? v.ordem : m), 0);
  const proxOrdem = maxOrdem + 1;
  const curso = (leg && leg.curso && leg.curso !== 'ambos') ? leg.curso : (eps[0] && eps[0].curso) || 'ambos';

  document.getElementById('modal-titulo').textContent = 'Novo Episódio — ' + ((leg && leg.nome) || legId);
  ['m-id', 'm-descricao', 'm-capitulo', 'm-youtube'].forEach(i => document.getElementById(i).value = '');
  document.getElementById('m-curso').value = curso;
  document.getElementById('m-area').value = atDaLeg(leg, curso) || '';
  popularLegsPorArea(legId);
  document.getElementById('m-legislacao-id').value = legId;
  atualizarInfoLeg();
  document.getElementById('m-titulo').value = 'Aula ' + proxOrdem;
  document.getElementById('m-ordem').value = proxOrdem;
  document.getElementById('m-status').value = 'rascunho';
  atualizarPreview();
  document.getElementById('modal-erro').style.display = 'none';
  document.getElementById('overlay-modal').classList.add('aberto');
}

async function abrirModalEditar(id) {
  const v = todos.find(x => String(x.id) === String(id));
  if (!v) return;
  await carregarManifesto();
  document.getElementById('modal-titulo').textContent = 'Editar Videoaula';
  document.getElementById('m-id').value = v.id;
  document.getElementById('m-titulo').value = v.titulo || '';
  document.getElementById('m-descricao').value = v.descricao || '';
  document.getElementById('m-capitulo').value = v.capitulo || '';
  document.getElementById('m-ordem').value = (v.ordem != null ? v.ordem : '');
  document.getElementById('m-youtube').value = v.youtube_playlist_id
    ? ('https://www.youtube.com/playlist?list=' + v.youtube_playlist_id)
    : (v.youtube_id || '');
  document.getElementById('m-curso').value = v.curso || 'ambos';
  document.getElementById('m-area').value = atDaLeg(legPorId(v.legislacao_id), v.curso) || '';
  popularLegsPorArea(v.legislacao_id || '');
  atualizarInfoLeg();
  document.getElementById('m-status').value = v.status || 'rascunho';
  atualizarPreview();
  document.getElementById('modal-erro').style.display = 'none';
  document.getElementById('overlay-modal').classList.add('aberto');
}
function fecharModal() {
  document.getElementById('overlay-modal').classList.remove('aberto');
  document.getElementById('yt-iframe').src = ''; // para o vídeo do preview
}

async function salvar() {
  const btn = document.getElementById('btn-salvar');
  const erroEl = document.getElementById('modal-erro');
  erroEl.style.display = 'none';
  const id = document.getElementById('m-id').value;
  const legislacao_id = document.getElementById('m-legislacao-id').value;
  const titulo = document.getElementById('m-titulo').value.trim();
  const brutoVideo = document.getElementById('m-youtube').value.trim();
  const playlist = extrairPlaylistId(brutoVideo);
  const youtube_id = playlist ? null : extrairYoutubeId(brutoVideo);
  if (!legislacao_id) { erroEl.textContent = 'Selecione a legislação.'; erroEl.style.display = 'block'; return; }
  if (!titulo) { erroEl.textContent = 'Preencha o título.'; erroEl.style.display = 'block'; return; }
  if (!playlist && !youtube_id) { erroEl.textContent = 'Link de playlist ou vídeo do YouTube inválido.'; erroEl.style.display = 'block'; return; }
  const ordemRaw = document.getElementById('m-ordem').value.trim();
  const payload = {
    legislacao_id, titulo,
    youtube_playlist_id: playlist || null,
    youtube_id: youtube_id || null,
    descricao: document.getElementById('m-descricao').value.trim() || null,
    capitulo: document.getElementById('m-capitulo').value.trim() || null,
    ordem: ordemRaw === '' ? null : Number(ordemRaw),
    curso: document.getElementById('m-curso').value,
    status: document.getElementById('m-status').value,
  };
  btn.disabled = true; btn.textContent = 'Salvando…';
  try {
    if (id) await PBM.Admin.videoaulas.editar(id, payload);
    else await PBM.Admin.videoaulas.criar(payload);
    fecharModal();
    await carregar();
    AdminChrome.toast('Videoaula salva.', 'sucesso');
  } catch (err) {
    erroEl.textContent = err?.erro || err?.message || 'Falha ao salvar. Tente novamente.';
    erroEl.style.display = 'block';
  } finally { btn.disabled = false; btn.textContent = 'Salvar'; }
}

AdminChrome.init({
  pagina: 'videoaulas',
  titulo: 'Gestão de Videoaulas',
  acoes: [{
    texto: 'Nova Videoaula', variant: 'primary',
    icon: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
    onClick: abrirModalNovo,
  }],
});

document.getElementById('btn-fechar-modal').addEventListener('click', fecharModal);
document.getElementById('btn-cancelar-modal').addEventListener('click', fecharModal);
document.getElementById('btn-salvar').addEventListener('click', salvar);
document.getElementById('m-area').addEventListener('change', () => popularLegsPorArea());
document.getElementById('m-curso').addEventListener('change', () => popularLegsPorArea());
document.getElementById('m-legislacao-id').addEventListener('change', atualizarInfoLeg);
document.getElementById('m-youtube').addEventListener('input', atualizarPreview);
['filtro-curso', 'filtro-status'].forEach(i => document.getElementById(i).addEventListener('change', aplicarFiltros));
document.getElementById('filtro-busca').addEventListener('input', aplicarFiltros);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') fecharModal(); });

carregarManifesto();
carregar();
</script>
