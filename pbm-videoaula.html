<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/images/emblem-pbm.png" type="image/png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#C0270F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PBM">
<link rel="apple-touch-icon" href="/images/pwa-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocolo Bravo Mike — Videoaulas</title>
<script src="/js/font-size.js"></script>
<script src="/js/pbm-theme-boot.js?v=2"></script>
<link rel="stylesheet" href="/css/pbm-tokens.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/pbm-layout.css">
<style>
  body { background: var(--bg-primario, #0d0d0d); color: var(--branco, #fff); }
  .wrap { max-width: 720px; margin: 0 auto; padding: 24px 18px 64px; }
  .voltar { display: inline-block; margin-bottom: 16px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--cinza-texto, #9a9a9a); text-decoration: none; }
  .voltar:hover { color: var(--branco, #fff); }
  .topo { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .topo img { width: 30px; height: 30px; }
  .topo h1 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.04em; margin: 0; }
  .subtitulo { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--cinza-texto, #9a9a9a); margin: 0 0 22px; }

  /* Palco (player do YouTube): vídeo único ou playlist. */
  .palco { background: #000; border: 1px solid var(--cinza-borda, #2a2a2a); border-radius: 14px; overflow: hidden; aspect-ratio: 16/9; margin-bottom: 8px; display: none; }
  .palco.on { display: block; }
  .palco iframe { width: 100%; height: 100%; border: 0; display: block; }
  .palco-titulo { font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 600; margin: 0 0 22px; color: var(--branco, #fff); }
  .palco-titulo .lei { color: var(--cinza-texto, #9a9a9a); font-weight: 400; }

  .lista { display: flex; flex-direction: column; gap: 10px; }

  /* Cabeçalho da Área Temática (divide o conteúdo como no resto do site). */
  .at-titulo { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--cinza-texto, #9a9a9a); margin: 20px 2px 2px; padding-bottom: 6px; border-bottom: 1px solid var(--cinza-borda, #2a2a2a); }
  .at-titulo:first-child { margin-top: 0; }

  /* Série (lei) como acordeão minimalista. */
  .serie { border: 1px solid var(--cinza-borda, #2a2a2a); border-radius: 14px; overflow: hidden; background: var(--cinza-escuro, #1a1a1a); }
  .serie-cabecalho { display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; padding: 14px 16px; transition: background 0.15s; }
  .serie-cabecalho:hover { background: rgba(255,255,255,0.03); }
  .serie-nome {
    flex: 1; min-width: 0; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; color: var(--branco, #fff); line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .serie-selo { flex: none; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.04em; color: var(--cinza-texto, #9a9a9a); border: 1px solid var(--cinza-borda, #2a2a2a); border-radius: 999px; padding: 3px 9px; white-space: nowrap; }
  .serie-selo.completa { color: #fff; background: var(--vermelho, #C0270F); border-color: var(--vermelho, #C0270F); }
  .serie-chevron { flex: none; font-size: 15px; line-height: 1; color: var(--cinza-texto, #9a9a9a); transition: transform 0.2s; }
  .serie.colapsada .serie-chevron { transform: rotate(-90deg); }
  .serie-eps { display: flex; flex-direction: column; border-top: 1px solid var(--cinza-borda, #2a2a2a); }
  .serie.colapsada .serie-eps { display: none; }

  /* Linha de vídeo/playlist. */
  .card { display: flex; align-items: center; gap: 12px; padding: 11px 16px; transition: background 0.12s; }
  .card + .card { border-top: 1px solid rgba(255,255,255,0.05); }
  .card:hover { background: rgba(255,255,255,0.03); }
  .card.ativo { background: rgba(192,39,15,0.10); }
  .card .selecionar { flex: 1; min-width: 0; display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .card .ep-icone { flex: none; width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; font-size: 11px; color: var(--cinza-texto, #9a9a9a); border: 1px solid var(--cinza-borda, #2a2a2a); }
  .card.ativo .ep-icone, .card.concluido .ep-icone { color: #fff; background: var(--vermelho, #C0270F); border-color: var(--vermelho, #C0270F); }
  .card .ep-texto { flex: 1; min-width: 0; }
  .card h2 { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; margin: 0; color: var(--branco, #fff); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card .ep-tag { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--cinza-texto, #9a9a9a); border: 1px solid var(--cinza-borda, #2a2a2a); border-radius: 999px; padding: 1px 7px; margin-left: 8px; vertical-align: middle; }
  .card .cap { font-family: 'Inter', sans-serif; font-size: 11px; color: var(--cinza-texto, #9a9a9a); margin: 2px 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .visto-btn { flex: none; width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; background: transparent; border: 1px solid var(--cinza-borda, #2a2a2a); color: var(--cinza-texto, #9a9a9a); font-size: 13px; cursor: pointer; transition: all 0.15s; padding: 0; }
  .visto-btn:hover { color: var(--branco, #fff); border-color: var(--texto-suporte, #777); }
  .card.concluido .visto-btn { color: #fff; background: var(--vermelho, #C0270F); border-color: var(--vermelho, #C0270F); }

  .aviso { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--cinza-texto, #9a9a9a); padding: 20px 0; }
  .erro { color: var(--vermelho, #C0270F); }
</style>
</head>
<body>
  <div class="wrap">
    <a class="voltar" href="/dashboard">&larr; Voltar</a>
    <div class="topo"><img src="/images/emblem-pbm.png" alt=""><h1>Videoaulas</h1></div>
    <p class="subtitulo">Aulas em vídeo por legislação. Conteúdo exclusivo de assinante.</p>

    <div class="palco" id="palco"></div>
    <p class="palco-titulo" id="palco-titulo" style="display:none"></p>

    <div id="status" class="aviso">Carregando videoaulas…</div>
    <div id="lista" class="lista"></div>
  </div>

  <script src="/js/api.js?v=8"></script>
  <script>
    const elStatus = document.getElementById('status');
    const elLista = document.getElementById('lista');
    const elPalco = document.getElementById('palco');
    const elPalcoTitulo = document.getElementById('palco-titulo');

    let videos = [];

    // Player do YouTube via IFrame Player API (para medir tempo real assistido — ADR-0047).
    let player = null;        // instância YT.Player
    let apiPronta = false;    // window.onYouTubeIframeAPIReady já rodou?
    let pendente = null;      // linha aguardando a API carregar
    let videoaulaAtual = null;
    let segAcum = 0;          // segundos de relógio assistidos ainda não creditados
    let relogioBase = null;   // Date.now() do trecho assistindo (null = parado)
    let tick = null;          // heartbeat enquanto PLAYING

    // ── Área Temática: divide o conteúdo como no resto do site ───────────────
    const AT_LABEL = {
      AT1: 'AT1 — Segurança contra incêndios',
      AT2: 'AT2 — Combate a incêndios',
      AT3: 'AT3 — Buscas e salvamentos / APH',
      AT4: 'AT4 — Direito institucional e militar',
      AT5: 'AT5 — Normas e documentação técnica',
    };
    const AT_ORDEM = ['AT1', 'AT2', 'AT3', 'AT4', 'AT5'];
    function rotuloAT(at) { return AT_LABEL[at] || 'Outras legislações'; }

    function agruparPorAT(lista) {
      const porAT = new Map();
      lista.forEach((v) => {
        const at = v.area_tematica || 'OUTROS';
        if (!porAT.has(at)) porAT.set(at, []);
        porAT.get(at).push(v);
      });
      return [...porAT.keys()]
        .sort((a, b) => {
          const ia = AT_ORDEM.indexOf(a), ib = AT_ORDEM.indexOf(b);
          return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
        })
        .map((at) => [at, porAT.get(at)]);
    }

    // Agrupa por legislação (a série da lei), preservando a ordem do backend.
    function agruparPorLei(lista) {
      const grupos = new Map();
      lista.forEach((v) => {
        const chave = v.legislacao_id;
        if (!grupos.has(chave)) grupos.set(chave, { nome: v.legislacao_nome || chave, eps: [] });
        grupos.get(chave).eps.push(v);
      });
      return grupos;
    }

    // Rótulo curto: a lei já está no cabeçalho; tira a repetição do título.
    function rotuloItem(v) {
      let t = (v.titulo || '').trim();
      const lei = (v.legislacao_nome || '').trim();
      if (lei && t.toLowerCase().startsWith(lei.toLowerCase())) {
        t = t.slice(lei.length).replace(/^[\s—\-–:·.]+/, '').trim();
      }
      if (!t) t = v.youtube_playlist_id ? 'Playlist completa' : (v.capitulo || (v.ordem != null ? 'Aula ' + v.ordem : 'Vídeo'));
      return t;
    }

    function render(lista) {
      videos = lista;
      elLista.innerHTML = '';
      agruparPorAT(lista).forEach(([at, doAT]) => {
        const tit = document.createElement('h2');
        tit.className = 'at-titulo';
        tit.textContent = rotuloAT(at);
        elLista.appendChild(tit);
        agruparPorLei(doAT).forEach((grupo) => {
          elLista.appendChild(montarSerie(grupo));
          atualizarSelo(grupo.eps[0].legislacao_id);
        });
      });
    }

    function montarSerie(grupo) {
      const serie = document.createElement('section');
      serie.className = 'serie colapsada';
      serie.dataset.lei = grupo.eps[0].legislacao_id;

      const cab = document.createElement('div');
      cab.className = 'serie-cabecalho';
      cab.setAttribute('role', 'button');
      cab.tabIndex = 0;
      const nome = document.createElement('span');
      nome.className = 'serie-nome'; nome.textContent = grupo.nome;
      const selo = document.createElement('span');
      selo.className = 'serie-selo';
      const chevron = document.createElement('span');
      chevron.className = 'serie-chevron'; chevron.textContent = '⌄';
      cab.append(nome, selo, chevron);
      cab.addEventListener('click', () => serie.classList.toggle('colapsada'));
      cab.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); serie.classList.toggle('colapsada'); }
      });

      const eps = document.createElement('div');
      eps.className = 'serie-eps';
      linhasDaLei(grupo.eps).forEach((p) => eps.appendChild(montarLinha(p)));

      serie.append(cab, eps);
      return serie;
    }

    // Transforma as videoaulas da lei em "linhas tocáveis": uma playlist expandida
    // (videos[]) vira uma linha por aula; sem expansão cai em "Playlist completa";
    // vídeo único legado vira uma linha com toggle de visto.
    function linhasDaLei(eps) {
      const linhas = [];
      eps.forEach((v) => {
        if (v.videos && v.videos.length) {
          // Cada aula da playlist tem visto próprio: estado é o vídeo, progresso
          // gravado por (videoaula, youtube_id) — migration 062.
          v.videos.forEach((vid, i) => linhas.push({
            id: v.id + ':' + vid.youtube_id,
            label: vid.titulo || ('Aula ' + (i + 1)),
            youtube_id: vid.youtube_id,
            youtube_playlist_id: v.youtube_playlist_id,
            legislacao_nome: v.legislacao_nome,
            estado: vid, progressoVideoaulaId: v.id, progressoYoutubeId: vid.youtube_id, legId: v.legislacao_id,
          }));
        } else if (v.youtube_playlist_id) {
          linhas.push({
            id: v.id, label: 'Playlist completa', tag: 'Playlist',
            youtube_playlist_id: v.youtube_playlist_id, youtube_id: null,
            legislacao_nome: v.legislacao_nome,
            estado: v, progressoVideoaulaId: v.id, progressoYoutubeId: '', legId: v.legislacao_id,
          });
        } else {
          linhas.push({
            id: v.id, label: rotuloItem(v), youtube_id: v.youtube_id, youtube_playlist_id: null,
            capitulo: v.capitulo, legislacao_nome: v.legislacao_nome,
            estado: v, progressoVideoaulaId: v.id, progressoYoutubeId: '', legId: v.legislacao_id,
          });
        }
      });
      return linhas;
    }

    function montarLinha(p) {
      const concl = !!(p.estado && p.estado.concluido);
      const card = document.createElement('div');
      card.className = 'card' + (concl ? ' concluido' : '');
      card.dataset.id = p.id;

      const sel = document.createElement('div');
      sel.className = 'selecionar';
      const icone = document.createElement('span');
      icone.className = 'ep-icone'; icone.textContent = concl ? '✓' : '▶';
      const texto = document.createElement('div');
      texto.className = 'ep-texto';
      const h = document.createElement('h2');
      h.textContent = p.label;
      if (p.tag) {
        const tag = document.createElement('span');
        tag.className = 'ep-tag'; tag.textContent = p.tag;
        h.append(tag);
      }
      texto.append(h);
      if (p.capitulo) {
        const cap = document.createElement('p'); cap.className = 'cap'; cap.textContent = p.capitulo;
        texto.append(cap);
      }
      sel.append(icone, texto);
      sel.addEventListener('click', () => assistir(p));

      const btn = document.createElement('button');
      btn.className = 'visto-btn';
      btn.title = concl ? 'Visto — desmarcar' : 'Marcar como visto';
      btn.textContent = concl ? '✓' : '○';
      btn.addEventListener('click', (e) => { e.stopPropagation(); alternarVisto(p); });

      card.append(sel, btn);
      return card;
    }

    function atualizarCardVisual(card, concluido) {
      card.classList.toggle('concluido', !!concluido);
      card.querySelector('.ep-icone').textContent = concluido ? '✓' : '▶';
      const btn = card.querySelector('.visto-btn');
      if (btn) {
        btn.textContent = concluido ? '✓' : '○';
        btn.title = concluido ? 'Visto — desmarcar' : 'Marcar como visto';
      }
    }

    // Selo "X/Y vistos" da série, contando cada aula (vídeo da playlist conta 1).
    function atualizarSelo(legId) {
      const serie = elLista.querySelector('.serie[data-lei="' + CSS.escape(legId) + '"]');
      if (!serie) return;
      const eps = videos.filter((v) => v.legislacao_id === legId);
      let total = 0, vistos = 0;
      eps.forEach((v) => {
        if (v.videos && v.videos.length) { total += v.videos.length; vistos += v.videos.filter((x) => x.concluido).length; }
        else { total += 1; if (v.concluido) vistos++; }
      });
      const selo = serie.querySelector('.serie-selo');
      selo.textContent = vistos + '/' + total;
      selo.classList.toggle('completa', total > 0 && vistos === total);
    }

    // Check manual de "visto" (o iframe do YouTube não entrega eventos sem mudar a CSP).
    async function alternarVisto(p) {
      const novo = !p.estado.concluido;
      p.estado.concluido = novo;
      const card = elLista.querySelector('.card[data-id="' + CSS.escape(p.id) + '"]');
      if (card) atualizarCardVisual(card, novo);
      atualizarSelo(p.legId);
      try {
        await PBM.Videoaulas.salvarProgresso(p.progressoVideoaulaId, { concluido: novo, youtube_id: p.progressoYoutubeId });
      } catch {
        p.estado.concluido = !novo;
        if (card) atualizarCardVisual(card, !novo);
        atualizarSelo(p.legId);
      }
    }

    // ── Crédito de tempo ao Ciclo (ADR-0047): mede tempo de RELÓGIO assistido ───
    // via eventos da IFrame Player API e credita o delta ao Balde do bloco da
    // legislação. O backend ignora se a lei não tem bloco não-concluído no ciclo.
    function pulsar() {
      if (relogioBase != null) { segAcum += (Date.now() - relogioBase) / 1000; relogioBase = Date.now(); }
    }
    function enviar() {
      pulsar();
      if (!videoaulaAtual) return;
      const inteiro = Math.floor(segAcum);
      if (inteiro <= 0) return;
      segAcum -= inteiro;
      PBM.Videoaulas.tempo(videoaulaAtual.progressoVideoaulaId, {
        segundos: inteiro, youtube_id: videoaulaAtual.progressoYoutubeId,
      }).catch(() => {});
    }
    function iniciarRelogio() { relogioBase = Date.now(); if (!tick) tick = setInterval(enviar, 5000); }
    function pararRelogio() { pulsar(); relogioBase = null; if (tick) { clearInterval(tick); tick = null; } enviar(); }

    function onState(e) {
      const YTS = window.YT && YT.PlayerState;
      if (!YTS) return;
      if (e.data === YTS.PLAYING) iniciarRelogio();
      else if (e.data === YTS.PAUSED || e.data === YTS.ENDED) pararRelogio();
      else { pulsar(); relogioBase = null; } // BUFFERING/CUED: para de contar, sem flush
    }

    // Em background o vídeo costuma pausar (YouTube), disparando PAUSED → flush.
    window.addEventListener('pagehide', enviar);
    document.addEventListener('visibilitychange', () => { if (document.hidden) enviar(); });

    function criarPlayer(p) {
      const playerVars = { rel: 0, modestbranding: 1, autoplay: 1, enablejsapi: 1, origin: location.origin, playsinline: 1 };
      const opts = { width: '100%', height: '100%', playerVars, events: { onStateChange: onState } };
      if (p.youtube_playlist_id) {
        playerVars.listType = 'playlist';
        playerVars.list = p.youtube_playlist_id;
        if (p.youtube_id) opts.videoId = p.youtube_id;
      } else {
        opts.videoId = p.youtube_id;
      }
      player = new YT.Player('player', opts);
    }

    function assistir(p) {
      document.querySelectorAll('.card').forEach((c) => c.classList.toggle('ativo', c.dataset.id === p.id));
      // Credita o tempo do vídeo anterior e zera o contador para o novo.
      pararRelogio();
      segAcum = 0; relogioBase = null;
      videoaulaAtual = p;

      if (player) { try { player.destroy(); } catch {} player = null; }
      elPalco.innerHTML = '<div id="player"></div>';
      elPalco.classList.add('on');
      if (apiPronta) criarPlayer(p); else pendente = p;

      elPalcoTitulo.innerHTML = '';
      elPalcoTitulo.append(document.createTextNode(p.label));
      const lei = document.createElement('span');
      lei.className = 'lei'; lei.textContent = '  ·  ' + (p.legislacao_nome || '');
      elPalcoTitulo.append(lei);
      elPalcoTitulo.style.display = 'block';
      elPalco.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // Carrega a IFrame Player API (callback global exigido pela API do YouTube).
    window.onYouTubeIframeAPIReady = function () {
      apiPronta = true;
      if (pendente) { const p = pendente; pendente = null; criarPlayer(p); }
    };
    (function carregarYTApi() {
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    })();

    (async function init() {
      await PBM.protegerRota();
      // Deep-link a partir do Ciclo: ?legislacao_id= filtra a série daquela lei.
      const legFiltro = new URLSearchParams(location.search).get('legislacao_id');
      try {
        const lista = await PBM.Videoaulas.listar(legFiltro || undefined);
        if (!lista.length) {
          elStatus.textContent = legFiltro
            ? 'Nenhuma videoaula desta legislação ainda. Volte em breve.'
            : 'Nenhuma videoaula disponível ainda. Volte em breve.';
          return;
        }
        elStatus.style.display = 'none';
        render(lista);
      } catch (err) {
        elStatus.className = 'aviso erro';
        elStatus.textContent = err?.erro || 'Não foi possível carregar as videoaulas.';
      }
    })();
  </script>
</body>
</html>
