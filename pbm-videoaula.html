<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/images/emblem-pbm.png" type="image/png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#C0270F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PBM">
<link rel="apple-touch-icon" href="/images/pwa-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocolo Bravo Mike — Videoaulas</title>
<script src="/js/font-size.js"></script>
<script src="/js/pbm-theme-boot.js?v=2"></script>
<link rel="stylesheet" href="/css/pbm-tokens.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/pbm-layout.css">
<style>
  body { background: var(--bg-primario, #0d0d0d); color: var(--branco, #fff); }
  .wrap { max-width: 860px; margin: 0 auto; padding: 24px 18px 64px; }
  .voltar { display: inline-block; margin-bottom: 18px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--cinza-texto, #9a9a9a); text-decoration: none; }
  .voltar:hover { color: var(--branco, #fff); }
  .topo { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .topo img { width: 34px; height: 34px; }
  .topo h1 { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 0.04em; margin: 0; }
  .subtitulo { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--cinza-texto, #9a9a9a); margin: 0 0 22px; }

  .palco { background: #000; border: 1px solid var(--cinza-borda, #2a2a2a); border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; margin-bottom: 10px; display: none; }
  .palco.on { display: block; }
  .palco iframe { width: 100%; height: 100%; border: 0; display: block; }
  .palco-titulo { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; margin: 0 0 22px; color: var(--branco, #fff); }

  .lista { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .card { background: var(--cinza-escuro, #1a1a1a); border: 1px solid var(--cinza-borda, #2a2a2a); border-radius: 12px; overflow: hidden; cursor: pointer; transition: border-color 0.15s; }
  .card:hover, .card.ativo { border-color: var(--vermelho, #C0270F); }
  .card .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #000; }
  .card .meta { padding: 10px 12px; }
  .card h2 { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; margin: 0; color: var(--branco, #fff); }
  .card p { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--cinza-texto, #9a9a9a); margin: 4px 0 0; }

  .aviso { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--cinza-texto, #9a9a9a); padding: 20px 0; }
  .erro { color: var(--vermelho, #C0270F); }
</style>
</head>
<body>
  <div class="wrap">
    <a class="voltar" href="/dashboard">&larr; Voltar</a>
    <div class="topo"><img src="/images/emblem-pbm.png" alt=""><h1>Videoaulas</h1></div>
    <p class="subtitulo">Aulas em vídeo por legislação. Conteúdo exclusivo de assinante.</p>

    <div class="palco" id="palco"><iframe id="player" allow="encrypted-media; fullscreen" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div>
    <p class="palco-titulo" id="palco-titulo" style="display:none"></p>

    <div id="status" class="aviso">Carregando videoaulas…</div>
    <div id="lista" class="lista"></div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const elStatus = document.getElementById('status');
    const elLista = document.getElementById('lista');
    const elPalco = document.getElementById('palco');
    const elPlayer = document.getElementById('player');
    const elPalcoTitulo = document.getElementById('palco-titulo');

    function thumb(id) { return 'https://i.ytimg.com/vi/' + encodeURIComponent(id) + '/hqdefault.jpg'; }

    function render(videos) {
      elLista.innerHTML = '';
      videos.forEach((v) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.id = v.id;
        const img = document.createElement('img');
        img.className = 'thumb'; img.loading = 'lazy'; img.alt = ''; img.src = thumb(v.youtube_id);
        const meta = document.createElement('div');
        meta.className = 'meta';
        const h = document.createElement('h2'); h.textContent = v.titulo;
        const desc = document.createElement('p'); desc.textContent = v.descricao || '';
        meta.append(h, desc);
        card.append(img, meta);
        card.addEventListener('click', () => assistir(v));
        elLista.appendChild(card);
      });
    }

    function assistir(v) {
      document.querySelectorAll('.card').forEach((c) => c.classList.toggle('ativo', c.dataset.id === v.id));
      elPlayer.src = 'https://www.youtube-nocookie.com/embed/' + encodeURIComponent(v.youtube_id) + '?rel=0&autoplay=1&modestbranding=1';
      elPalco.classList.add('on');
      elPalcoTitulo.textContent = v.titulo;
      elPalcoTitulo.style.display = 'block';
      elPalco.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    (async function init() {
      await PBM.protegerRota();
      try {
        const videos = await PBM.Videoaulas.listar();
        if (!videos.length) { elStatus.textContent = 'Nenhuma videoaula disponível ainda. Volte em breve.'; return; }
        elStatus.style.display = 'none';
        render(videos);
      } catch (err) {
        elStatus.className = 'aviso erro';
        elStatus.textContent = err?.erro || 'Não foi possível carregar as videoaulas.';
      }
    })();
  </script>
</body>
</html>
