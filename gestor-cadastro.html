<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GraduaBM — Cadastro de Gestor</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --carvao: #0F0F0F;
    --cinza-escuro: #1A1A1A;
    --cinza-medio: #2A2A2A;
    --cinza-borda: #333;
    --cinza-texto: #888;
    --branco: #F8F6F2;
    --roxo: #7F77DD;
    --roxo-bg: rgba(127,119,221,0.08);
    --roxo-borda: rgba(127,119,221,0.3);
    --verde: #27A05A;
    --erro: #E24B4A;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--carvao); color: var(--branco); font-family: 'IBM Plex Sans', sans-serif; font-size: 15px; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }

  .card { background: var(--cinza-escuro); border: 1px solid var(--cinza-borda); border-radius: 14px; padding: 2.5rem; width: 100%; max-width: 420px; }

  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.06em; color: var(--branco); text-align: center; margin-bottom: 4px; }
  .subtitulo { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #AFA9EC; letter-spacing: 0.08em; text-align: center; margin-bottom: 2.5rem; text-transform: uppercase; }

  .aviso-convite { background: var(--roxo-bg); border: 1px solid var(--roxo-borda); border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #AFA9EC; margin-bottom: 1.5rem; line-height: 1.5; }
  .aviso-convite strong { color: var(--branco); }

  .campo { margin-bottom: 1.25rem; }
  label { display: block; font-size: 11px; font-weight: 500; color: var(--cinza-texto); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  input { width: 100%; background: var(--cinza-medio); border: 1px solid var(--cinza-borda); color: var(--branco); border-radius: 8px; padding: 10px 14px; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.15s; }
  input:focus { border-color: var(--roxo); }
  input:read-only { opacity: 0.6; cursor: not-allowed; }

  .btn { width: 100%; background: var(--roxo); color: #fff; border: none; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'IBM Plex Sans', sans-serif; transition: background 0.2s; margin-top: 0.5rem; }
  .btn:hover { background: #6960C8; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .msg { margin-top: 1rem; padding: 10px 14px; border-radius: 8px; font-size: 13px; display: none; }
  .msg.erro { background: rgba(226,75,74,0.1); border: 1px solid rgba(226,75,74,0.3); color: #F09595; display: block; }
  .msg.sucesso { background: rgba(39,160,90,0.1); border: 1px solid rgba(39,160,90,0.3); color: #7DD99A; display: block; }

  .convite-invalido { text-align: center; padding: 2rem 0; }
  .convite-invalido h2 { font-size: 18px; margin-bottom: 8px; color: #E24B4A; }
  .convite-invalido p { font-size: 13px; color: var(--cinza-texto); }

  .rodape { text-align: center; margin-top: 1.5rem; font-size: 12px; color: #555; }
  .rodape a { color: var(--roxo); text-decoration: none; }
  .rodape a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">GraduaBM</div>
  <div class="subtitulo">Cadastro de Gestor</div>

  <div id="conteudo-loading" style="text-align:center;color:#555;font-size:13px;padding:1rem 0;">Verificando convite…</div>
  <div id="conteudo-invalido" class="convite-invalido" style="display:none">
    <h2>Convite inválido</h2>
    <p>Este link de convite é inválido, expirou ou já foi utilizado.<br>Solicite um novo convite ao administrador.</p>
  </div>

  <form id="form-cadastro" style="display:none">
    <div class="aviso-convite">
      Você foi convidado para gerenciar o <strong>GraduaBM</strong> como gestor. Preencha seus dados para criar sua conta.
    </div>
    <div class="campo">
      <label for="email">Email</label>
      <input type="email" id="email" readonly>
    </div>
    <div class="campo">
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" placeholder="Seu nome" autocomplete="name" required>
    </div>
    <div class="campo">
      <label for="senha">Senha (mín. 8 caracteres)</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="new-password" required minlength="8">
    </div>
    <div class="campo">
      <label for="senha2">Confirmar senha</label>
      <input type="password" id="senha2" placeholder="••••••••" autocomplete="new-password" required minlength="8">
    </div>
    <button class="btn" type="submit" id="btn-cadastro">Criar conta</button>
    <div class="msg" id="msg"></div>
  </form>

  <div class="rodape"><a href="/">Voltar ao início</a></div>
</div>

<script>
const API = 'https://graduabm-backend-production.up.railway.app';

const params = new URLSearchParams(window.location.search);
const tokenConvite = params.get('token');
const emailConvite = params.get('email');

function mostrarInvalido() {
  document.getElementById('conteudo-loading').style.display = 'none';
  document.getElementById('conteudo-invalido').style.display = 'block';
}

if (!tokenConvite || !emailConvite) {
  mostrarInvalido();
} else {
  document.getElementById('conteudo-loading').style.display = 'none';
  document.getElementById('email').value = decodeURIComponent(emailConvite);
  document.getElementById('form-cadastro').style.display = 'block';
}

document.getElementById('form-cadastro').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-cadastro');
  const msg = document.getElementById('msg');
  msg.className = 'msg';
  msg.textContent = '';

  const nome = document.getElementById('nome').value.trim();
  const senha = document.getElementById('senha').value;
  const senha2 = document.getElementById('senha2').value;
  const email = document.getElementById('email').value;

  if (senha !== senha2) {
    msg.className = 'msg erro';
    msg.textContent = 'As senhas não coincidem.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Criando conta…';

  try {
    const res = await fetch(API + '/api/gestor/auth/cadastro', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, nome, senha, token_convite: tokenConvite }),
    });
    const data = await res.json();

    if (!res.ok) {
      msg.className = 'msg erro';
      msg.textContent = data.erro || 'Erro ao criar conta.';
      btn.disabled = false;
      btn.textContent = 'Criar conta';
      return;
    }

    sessionStorage.setItem('graduabm_gestor', '1');
    sessionStorage.setItem('graduabm_gestor_token', data.token);
    sessionStorage.setItem('graduabm_gestor_nome', data.gestor.nome);
    sessionStorage.setItem('graduabm_gestor_email', data.gestor.email);

    msg.className = 'msg sucesso';
    msg.textContent = 'Conta criada com sucesso! Redirecionando…';
    setTimeout(() => { window.location.href = '/gestor-painel'; }, 1200);
  } catch {
    msg.className = 'msg erro';
    msg.textContent = 'Sem conexão com o servidor.';
    btn.disabled = false;
    btn.textContent = 'Criar conta';
  }
});
</script>
</body>
</html>
