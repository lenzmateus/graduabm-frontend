<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/images/emblem-pbm.png" type="image/png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#C0270F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PBM">
<link rel="apple-touch-icon" href="/images/pwa-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocolo Bravo Mike — Podcasts</title>
<script src="/js/font-size.js"></script>
<script src="/js/pbm-theme-boot.js?v=2"></script>
<link rel="stylesheet" href="/css/pbm-tokens.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/pbm-layout.css">
<style>
  body { background: var(--bg-primario, #0d0d0d); color: var(--branco, #fff); }
  .wrap { max-width: 680px; margin: 0 auto; padding: 24px 18px 140px; }

  .topo { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .topo img { width: 30px; height: 30px; }
  .topo h1 {
    font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.04em;
    margin: 0; color: var(--branco, #fff);
  }
  .voltar {
    display: inline-block; margin-bottom: 16px; font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; color: var(--cinza-texto, #9a9a9a); text-decoration: none;
  }
  .voltar:hover { color: var(--branco, #fff); }
  .subtitulo {
    font-family: 'Inter', sans-serif; font-size: 13px; color: var(--cinza-texto, #9a9a9a);
    margin: 0 0 22px;
  }

  .lista { display: flex; flex-direction: column; gap: 10px; }

  /* Cabeçalho da Área Temática (divide o conteúdo como no resto do site). */
  .at-titulo { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--cinza-texto, #9a9a9a); margin: 20px 2px 2px; padding-bottom: 6px; border-bottom: 1px solid var(--cinza-borda, #2a2a2a); }
  .at-titulo:first-child { margin-top: 0; }

  /* ── Série (lei) como acordeão minimalista ─────────────────────────────── */
  .serie { border: 1px solid var(--cinza-borda, #2a2a2a); border-radius: 14px; overflow: hidden; background: var(--cinza-escuro, #1a1a1a); }
  .serie-cabecalho {
    display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none;
    padding: 14px 16px; transition: background 0.15s;
  }
  .serie-cabecalho:hover { background: rgba(255,255,255,0.03); }
  .serie-nome {
    flex: 1; min-width: 0; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
    color: var(--branco, #fff); line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .serie-selo {
    flex: none; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.04em;
    color: var(--cinza-texto, #9a9a9a); border: 1px solid var(--cinza-borda, #2a2a2a);
    border-radius: 999px; padding: 3px 9px; white-space: nowrap;
  }
  .serie-selo.completa { color: #fff; background: var(--vermelho, #C0270F); border-color: var(--vermelho, #C0270F); }
  .serie-chevron { flex: none; font-size: 15px; line-height: 1; color: var(--cinza-texto, #9a9a9a); transition: transform 0.2s; }
  .serie.colapsada .serie-chevron { transform: rotate(-90deg); }
  .serie-eps { display: flex; flex-direction: column; border-top: 1px solid var(--cinza-borda, #2a2a2a); }
  .serie.colapsada .serie-eps { display: none; }

  /* ── Episódio: uma linha limpa, sem acavalar ───────────────────────────── */
  .card { display: flex; align-items: center; gap: 12px; padding: 11px 16px; transition: background 0.12s; }
  .card + .card { border-top: 1px solid rgba(255,255,255,0.05); }
  .card:hover { background: rgba(255,255,255,0.03); }
  .card.ativo { background: rgba(192,39,15,0.10); }
  .card .selecionar { flex: 1; min-width: 0; display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .card .ep-icone {
    flex: none; width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center;
    font-size: 11px; color: var(--cinza-texto, #9a9a9a); border: 1px solid var(--cinza-borda, #2a2a2a);
  }
  .card.ativo .ep-icone, .card.concluido .ep-icone { color: #fff; background: var(--vermelho, #C0270F); border-color: var(--vermelho, #C0270F); }
  .card .ep-texto { flex: 1; min-width: 0; }
  .card h2 {
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; margin: 0;
    color: var(--branco, #fff); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card .cap {
    font-family: 'Inter', sans-serif; font-size: 11px; color: var(--cinza-texto, #9a9a9a); margin: 2px 0 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card .ouvido-btn {
    flex: none; width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center;
    background: transparent; border: 1px solid var(--cinza-borda, #2a2a2a); color: var(--cinza-texto, #9a9a9a);
    font-size: 13px; cursor: pointer; transition: all 0.15s; padding: 0;
  }
  .card .ouvido-btn:hover { color: var(--branco, #fff); border-color: var(--texto-suporte, #777); }
  .card.concluido .ouvido-btn { color: #fff; background: var(--vermelho, #C0270F); border-color: var(--vermelho, #C0270F); }

  /* ── Player fixo no rodapé ─────────────────────────────────────────────── */
  .player {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
    background: rgba(20,20,20,0.96); backdrop-filter: blur(12px);
    border-top: 1px solid var(--cinza-borda, #2a2a2a);
    padding: 12px 18px calc(12px + env(safe-area-inset-bottom, 0px));
  }
  .player[hidden] { display: none; }
  .player-inner { max-width: 680px; margin: 0 auto; }
  .pl-agora {
    font-family: 'Inter', sans-serif; font-size: 12.5px; color: var(--branco, #fff); margin: 0 0 9px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pl-agora .pl-agora-lei { color: var(--cinza-texto, #9a9a9a); }
  .pl-linha { display: flex; align-items: center; gap: 12px; }
  .pl-play {
    flex: none; width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--vermelho, #C0270F); color: #fff; font-size: 16px; display: grid; place-items: center;
    transition: transform 0.1s, background 0.15s;
  }
  .pl-play:hover { background: #d93a22; }
  .pl-play:active { transform: scale(0.94); }
  .pl-mid { flex: 1; min-width: 0; }
  .pl-track-row { display: flex; align-items: center; gap: 10px; }
  .pl-time { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--cinza-texto, #9a9a9a); flex: none; width: 34px; }
  .pl-time.fim { text-align: right; }
  .pl-track { flex: 1; height: 16px; display: flex; align-items: center; cursor: pointer; touch-action: none; }
  .pl-track-bar { position: relative; width: 100%; height: 4px; border-radius: 999px; background: var(--cinza-borda, #2a2a2a); }
  .pl-fill { position: absolute; left: 0; top: 0; height: 100%; width: 0%; border-radius: 999px; background: var(--vermelho, #C0270F); }
  .pl-knob {
    position: absolute; top: 50%; left: 0%; width: 11px; height: 11px; border-radius: 50%;
    background: #fff; transform: translate(-50%, -50%); box-shadow: 0 1px 4px rgba(0,0,0,0.5);
  }
  .velocidades { display: flex; align-items: center; gap: 6px; margin-top: 11px; }
  .vel-label { font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--cinza-texto, #9a9a9a); margin-right: 2px; }
  .vel-btn {
    background: transparent; border: 1px solid var(--cinza-borda, #2a2a2a); color: var(--cinza-texto, #9a9a9a);
    border-radius: 999px; padding: 4px 11px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.15s;
  }
  .vel-btn:hover { color: var(--branco, #fff); border-color: var(--texto-suporte, #777); }
  .vel-btn.ativo { background: var(--vermelho, #C0270F); border-color: var(--vermelho, #C0270F); color: #fff; }

  .aviso { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--cinza-texto, #9a9a9a); padding: 20px 0; }
  .erro { color: var(--vermelho, #C0270F); }
</style>
</head>
<body>
  <div class="wrap">
    <a class="voltar" href="/dashboard">&larr; Voltar</a>
    <div class="topo">
      <img src="/images/emblem-pbm.png" alt="">
      <h1>Podcasts</h1>
    </div>
    <p class="subtitulo">Áudios de legislação para estudar no fone. Conteúdo exclusivo de assinante.</p>

    <div id="status" class="aviso">Carregando podcasts…</div>
    <div id="lista" class="lista"></div>
  </div>

  <div id="player" class="player" hidden>
    <div class="player-inner">
      <p class="pl-agora" id="agora"></p>
      <audio id="audio" preload="none" oncontextmenu="return false"></audio>
      <div class="pl-linha">
        <button class="pl-play" id="pl-play" aria-label="Tocar" title="Tocar/Pausar">▶</button>
        <div class="pl-mid">
          <div class="pl-track-row">
            <span class="pl-time" id="pl-atual">0:00</span>
            <div class="pl-track" id="pl-track" role="slider" aria-label="Progresso" tabindex="0">
              <div class="pl-track-bar"><div class="pl-fill" id="pl-fill"></div><div class="pl-knob" id="pl-knob"></div></div>
            </div>
            <span class="pl-time fim" id="pl-total">0:00</span>
          </div>
          <div class="velocidades" id="velocidades">
            <span class="vel-label">Velocidade</span>
            <button class="vel-btn ativo" data-vel="1">1x</button>
            <button class="vel-btn" data-vel="1.25">1.25x</button>
            <button class="vel-btn" data-vel="1.5">1.5x</button>
            <button class="vel-btn" data-vel="2">2x</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const elStatus = document.getElementById('status');
    const elLista = document.getElementById('lista');
    const elPlayer = document.getElementById('player');
    const elAgora = document.getElementById('agora');
    const elAudio = document.getElementById('audio');
    const elPlay = document.getElementById('pl-play');
    const elTrack = document.getElementById('pl-track');
    const elFill = document.getElementById('pl-fill');
    const elKnob = document.getElementById('pl-knob');
    const elAtual = document.getElementById('pl-atual');
    const elTotal = document.getElementById('pl-total');

    let podcastAtual = null;
    let recarregandoUrl = false;
    let ultimoSalvo = 0;     // timestamp do último save (throttle)
    let posicaoInicial = 0;  // onde retomar quando o áudio carregar
    let episodios = [];      // lista achatada (já ordenada pelo backend) p/ auto-play
    let arrastando = false;  // seek por arraste na barra
    let segAcum = 0;         // segundos de relógio tocados ainda não creditados ao Ciclo (ADR-0047)
    let relogioBase = null;  // Date.now() do início do trecho tocando (null = parado)

    function fmtTempo(s) {
      if (!isFinite(s) || s < 0) return '0:00';
      const m = Math.floor(s / 60), seg = Math.floor(s % 60);
      return m + ':' + String(seg).padStart(2, '0');
    }

    // Rótulo curto do episódio: a lei já aparece no cabeçalho da série, então
    // tiramos a repetição do nome da lei do título ("Lei … — Aula 2" => "Aula 2").
    function rotuloEpisodio(p) {
      let t = (p.titulo || '').trim();
      const lei = (p.legislacao_nome || '').trim();
      if (lei && t.toLowerCase().startsWith(lei.toLowerCase())) {
        t = t.slice(lei.length).replace(/^[\s—\-–:·.]+/, '').trim();
      }
      if (!t) t = p.capitulo ? p.capitulo : (p.ordem != null ? 'Aula ' + p.ordem : 'Episódio');
      return t;
    }

    // ── Área Temática: divide o conteúdo como no resto do site ───────────────
    const AT_LABEL = {
      AT1: 'AT1 — Segurança contra incêndios',
      AT2: 'AT2 — Combate a incêndios',
      AT3: 'AT3 — Buscas e salvamentos / APH',
      AT4: 'AT4 — Direito institucional e militar',
      AT5: 'AT5 — Normas e documentação técnica',
    };
    const AT_ORDEM = ['AT1', 'AT2', 'AT3', 'AT4', 'AT5'];
    function rotuloAT(at) { return AT_LABEL[at] || 'Outras legislações'; }

    // Agrupa por Área Temática, preservando a ordem AT1…AT5 (depois "Outras").
    function agruparPorAT(podcasts) {
      const porAT = new Map();
      podcasts.forEach((p) => {
        const at = p.area_tematica || 'OUTROS';
        if (!porAT.has(at)) porAT.set(at, []);
        porAT.get(at).push(p);
      });
      return [...porAT.keys()]
        .sort((a, b) => {
          const ia = AT_ORDEM.indexOf(a), ib = AT_ORDEM.indexOf(b);
          return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib);
        })
        .map((at) => [at, porAT.get(at)]);
    }

    // Agrupa episódios por legislação (a série da lei), preservando a ordem do backend.
    function agruparPorLei(podcasts) {
      const grupos = new Map();
      podcasts.forEach((p) => {
        const chave = p.legislacao_id;
        if (!grupos.has(chave)) grupos.set(chave, { nome: p.legislacao_nome || chave, eps: [] });
        grupos.get(chave).eps.push(p);
      });
      return grupos;
    }

    function montarSerie(grupo) {
      const serie = document.createElement('section');
      serie.className = 'serie colapsada';
      serie.dataset.lei = grupo.eps[0].legislacao_id;

      const cab = document.createElement('div');
      cab.className = 'serie-cabecalho';
      cab.setAttribute('role', 'button');
      cab.tabIndex = 0;
      const nome = document.createElement('span');
      nome.className = 'serie-nome';
      nome.textContent = grupo.nome;
      const selo = document.createElement('span');
      selo.className = 'serie-selo';
      const chevron = document.createElement('span');
      chevron.className = 'serie-chevron';
      chevron.textContent = '⌄';
      cab.append(nome, selo, chevron);
      cab.addEventListener('click', () => alternarSerie(serie));
      cab.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); alternarSerie(serie); }
      });

      const eps = document.createElement('div');
      eps.className = 'serie-eps';
      grupo.eps.forEach((p) => eps.appendChild(montarEpisodio(p)));

      serie.append(cab, eps);
      return serie;
    }

    function render(podcasts) {
      episodios = podcasts;
      elLista.innerHTML = '';
      agruparPorAT(podcasts).forEach(([at, doAT]) => {
        const tit = document.createElement('h2');
        tit.className = 'at-titulo';
        tit.textContent = rotuloAT(at);
        elLista.appendChild(tit);
        agruparPorLei(doAT).forEach((grupo) => {
          elLista.appendChild(montarSerie(grupo));
          atualizarSelo(grupo.eps[0].legislacao_id);
        });
      });
    }

    function alternarSerie(serie) {
      serie.classList.toggle('colapsada');
    }

    // Garante que a série de um episódio esteja expandida (ex.: ao tocar/auto-avançar).
    function abrirSerieDoEpisodio(legId) {
      const serie = elLista.querySelector('.serie[data-lei="' + CSS.escape(legId) + '"]');
      if (serie) serie.classList.remove('colapsada');
    }

    function montarEpisodio(p) {
      const card = document.createElement('div');
      card.className = 'card' + (p.concluido ? ' concluido' : '');
      card.dataset.id = p.id;
      card.dataset.lei = p.legislacao_id;

      const sel = document.createElement('div');
      sel.className = 'selecionar';
      const icone = document.createElement('span');
      icone.className = 'ep-icone';
      const texto = document.createElement('div');
      texto.className = 'ep-texto';
      const h = document.createElement('h2');
      h.textContent = rotuloEpisodio(p);
      texto.append(h);
      if (p.capitulo) {
        const cap = document.createElement('p');
        cap.className = 'cap';
        cap.textContent = p.capitulo;
        texto.append(cap);
      }
      sel.append(icone, texto);
      sel.addEventListener('click', () => tocar(p));

      const btn = document.createElement('button');
      btn.className = 'ouvido-btn';
      btn.title = 'Marcar como ouvido';
      btn.addEventListener('click', (e) => { e.stopPropagation(); alternarOuvido(p); });

      card.append(sel, btn);
      atualizarCardVisual(card, p);
      return card;
    }

    function atualizarCardVisual(card, p) {
      card.classList.toggle('concluido', !!p.concluido);
      const icone = card.querySelector('.ep-icone');
      const btn = card.querySelector('.ouvido-btn');
      if (p.concluido) { icone.textContent = '✓'; btn.textContent = '✓'; btn.title = 'Ouvido — desmarcar'; }
      else if (p.posicao_segundos > 0) { icone.textContent = '▶'; btn.textContent = '○'; btn.title = 'Marcar como ouvido'; }
      else { icone.textContent = '○'; btn.textContent = '○'; btn.title = 'Marcar como ouvido'; }
    }

    // Selo "X/Y ouvidos" da série; fica destacado quando completa.
    function atualizarSelo(legId) {
      const serie = elLista.querySelector('.serie[data-lei="' + CSS.escape(legId) + '"]');
      if (!serie) return;
      const eps = episodios.filter((p) => p.legislacao_id === legId);
      const ouvidos = eps.filter((p) => p.concluido).length;
      const selo = serie.querySelector('.serie-selo');
      selo.textContent = ouvidos + '/' + eps.length;
      selo.classList.toggle('completa', ouvidos === eps.length && eps.length > 0);
    }

    // Toggle manual de "ouvido" (além do automático no fim do áudio).
    async function alternarOuvido(p) {
      const novo = !p.concluido;
      p.concluido = novo;
      const card = elLista.querySelector('.card[data-id="' + CSS.escape(p.id) + '"]');
      if (card) atualizarCardVisual(card, p);
      atualizarSelo(p.legislacao_id);
      try {
        await PBM.Podcasts.salvarProgresso(p.id, {
          posicao_segundos: novo ? (p.posicao_segundos || 0) : 0,
          concluido: novo,
        });
      } catch {
        p.concluido = !novo; // desfaz o otimismo se falhar
        if (card) atualizarCardVisual(card, p);
        atualizarSelo(p.legislacao_id);
      }
    }

    function marcarAtivo(id) {
      document.querySelectorAll('.card').forEach((c) => {
        c.classList.toggle('ativo', c.dataset.id === id);
      });
    }

    async function obterUrl(id) {
      const { url } = await PBM.Podcasts.stream(id);
      return url;
    }

    async function tocar(p) {
      // Salva a posição e credita o tempo do que estava tocando antes de trocar.
      salvarProgresso();
      enviarTempo();
      segAcum = 0; relogioBase = null; // reset do contador de relógio para o novo episódio
      podcastAtual = p;
      posicaoInicial = 0;
      abrirSerieDoEpisodio(p.legislacao_id);
      marcarAtivo(p.id);
      elPlayer.hidden = false;
      elAgora.innerHTML = '';
      elAgora.append(document.createTextNode(rotuloEpisodio(p)));
      const lei = document.createElement('span');
      lei.className = 'pl-agora-lei';
      lei.textContent = '  ·  ' + (p.legislacao_nome || '');
      elAgora.append(lei);
      atualizarBarra();
      definirMediaSession(p);
      // Busca a posição de retomada (não bloqueia o carregamento do áudio).
      PBM.Podcasts.progresso(p.id)
        .then((prog) => { if (prog && !prog.concluido) posicaoInicial = prog.posicao_segundos || 0; })
        .catch(() => {});
      try {
        elAudio.src = await obterUrl(p.id);
        elAudio.play().catch(() => { /* autoplay pode ser bloqueado; usuário dá play */ });
      } catch (err) {
        elAgora.textContent = err?.erro || 'Falha ao preparar o áudio. Tente novamente.';
      }
    }

    // ── Player custom: play/pause, barra de progresso e tempos ───────────────
    elPlay.addEventListener('click', () => {
      if (elAudio.paused) elAudio.play().catch(() => {});
      else elAudio.pause();
    });
    elAudio.addEventListener('play', () => { elPlay.textContent = '⏸'; elPlay.setAttribute('aria-label', 'Pausar'); });
    elAudio.addEventListener('pause', () => { elPlay.textContent = '▶'; elPlay.setAttribute('aria-label', 'Tocar'); });

    function atualizarBarra() {
      const d = elAudio.duration || 0;
      const r = d ? Math.min(1, elAudio.currentTime / d) : 0;
      elFill.style.width = (r * 100) + '%';
      elKnob.style.left = (r * 100) + '%';
      elAtual.textContent = fmtTempo(elAudio.currentTime || 0);
      elTotal.textContent = fmtTempo(d);
    }

    // Retoma da última posição assim que o áudio sabe sua duração.
    elAudio.addEventListener('loadedmetadata', () => {
      if (posicaoInicial > 0 && posicaoInicial < elAudio.duration - 2) {
        try { elAudio.currentTime = posicaoInicial; } catch {}
      }
      posicaoInicial = 0;
      atualizarBarra();
    });
    elAudio.addEventListener('timeupdate', () => { if (!arrastando) atualizarBarra(); });

    // Seek: clique ou arraste na barra.
    function seekDoEvento(e) {
      const rect = elTrack.getBoundingClientRect();
      const r = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
      if (elAudio.duration) { elAudio.currentTime = r * elAudio.duration; atualizarBarra(); }
    }
    elTrack.addEventListener('pointerdown', (e) => { arrastando = true; elTrack.setPointerCapture(e.pointerId); seekDoEvento(e); });
    elTrack.addEventListener('pointermove', (e) => { if (arrastando) seekDoEvento(e); });
    elTrack.addEventListener('pointerup', () => { arrastando = false; salvarProgresso(); });
    elTrack.addEventListener('keydown', (e) => {
      if (!elAudio.duration) return;
      if (e.key === 'ArrowRight') { elAudio.currentTime = Math.min(elAudio.duration, elAudio.currentTime + 10); atualizarBarra(); }
      if (e.key === 'ArrowLeft') { elAudio.currentTime = Math.max(0, elAudio.currentTime - 10); atualizarBarra(); }
    });

    // ── Progresso de escuta (resume) ──────────────────────────────────────────
    function salvarProgresso(concluido) {
      if (!podcastAtual || !elAudio.currentTime) return;
      PBM.Podcasts.salvarProgresso(podcastAtual.id, {
        posicao_segundos: Math.floor(elAudio.currentTime),
        concluido: !!concluido,
      }).catch(() => {});
    }
    // ── Crédito de tempo ao Ciclo (ADR-0047): mede tempo de RELÓGIO tocado ──────
    // (não currentTime — 2x/seek não inflam) e credita o delta ao Balde do bloco
    // da legislação. O backend ignora se a lei não tem bloco não-concluído no ciclo.
    function pulsarRelogio() {
      if (relogioBase != null) { segAcum += (Date.now() - relogioBase) / 1000; relogioBase = Date.now(); }
    }
    function enviarTempo() {
      pulsarRelogio();
      if (!podcastAtual) return;
      const inteiro = Math.floor(segAcum);
      if (inteiro <= 0) return;
      segAcum -= inteiro; // mantém o resto fracionário p/ o próximo envio
      PBM.Podcasts.tempo(podcastAtual.id, { segundos: inteiro }).catch(() => {});
    }
    function pararRelogio() { pulsarRelogio(); relogioBase = null; enviarTempo(); }
    elAudio.addEventListener('play', () => { relogioBase = Date.now(); });

    elAudio.addEventListener('timeupdate', () => {
      const agora = Date.now();
      if (agora - ultimoSalvo > 10000) { ultimoSalvo = agora; salvarProgresso(); enviarTempo(); }
    });
    elAudio.addEventListener('pause', () => { salvarProgresso(); pararRelogio(); });
    elAudio.addEventListener('ended', aoTerminar);
    // Em background o áudio pode seguir tocando: só faz flush, não para o relógio.
    window.addEventListener('pagehide', () => { salvarProgresso(); enviarTempo(); });
    document.addEventListener('visibilitychange', () => { if (document.hidden) { salvarProgresso(); enviarTempo(); } });

    // Fim do episódio: marca como ouvido, atualiza o selo da série e toca o próximo capítulo.
    function aoTerminar() {
      pararRelogio(); // credita o tempo final antes de trocar de episódio
      salvarProgresso(true);
      if (!podcastAtual) return;
      const concluido = podcastAtual;
      concluido.concluido = true;
      concluido.posicao_segundos = 0;
      const card = elLista.querySelector('.card[data-id="' + CSS.escape(concluido.id) + '"]');
      if (card) atualizarCardVisual(card, concluido);
      atualizarSelo(concluido.legislacao_id);

      const proximo = proximoDaSerie(concluido);
      if (proximo) tocar(proximo);
    }

    // Próximo episódio da MESMA lei na ordem já entregue pelo backend.
    function proximoDaSerie(atual) {
      const daLei = episodios.filter((p) => p.legislacao_id === atual.legislacao_id);
      const i = daLei.findIndex((p) => p.id === atual.id);
      return i >= 0 && i + 1 < daLei.length ? daLei[i + 1] : null;
    }

    // ── Velocidade de reprodução ──────────────────────────────────────────────
    document.getElementById('velocidades').addEventListener('click', (e) => {
      const btn = e.target.closest('.vel-btn');
      if (!btn) return;
      elAudio.playbackRate = parseFloat(btn.dataset.vel);
      document.querySelectorAll('.vel-btn').forEach((b) => b.classList.toggle('ativo', b === btn));
    });

    // ── Media Session (controles na tela de bloqueio) ─────────────────────────
    function definirMediaSession(p) {
      if (!('mediaSession' in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: rotuloEpisodio(p),
        artist: p.legislacao_nome || 'Protocolo Bravo Mike',
        artwork: [{ src: '/images/pwa-512.png', sizes: '512x512', type: 'image/png' }],
      });
      navigator.mediaSession.setActionHandler('play', () => elAudio.play());
      navigator.mediaSession.setActionHandler('pause', () => elAudio.pause());
      navigator.mediaSession.setActionHandler('seekbackward', () => { elAudio.currentTime = Math.max(0, elAudio.currentTime - 10); });
      navigator.mediaSession.setActionHandler('seekforward', () => { elAudio.currentTime = Math.min(elAudio.duration || 0, elAudio.currentTime + 10); });
    }

    // Re-aquisição defensiva: se a URL assinada expirar/falhar no meio, busca uma
    // nova uma vez. O <audio> retoma da posição já bufferizada.
    elAudio.addEventListener('error', reacquireUrl);
    elAudio.addEventListener('stalled', reacquireUrl);
    async function reacquireUrl() {
      if (!podcastAtual || recarregandoUrl) return;
      recarregandoUrl = true;
      try {
        const pos = elAudio.currentTime;
        elAudio.src = await obterUrl(podcastAtual.id);
        elAudio.currentTime = pos || 0;
        elAudio.play().catch(() => {});
      } catch { /* mantém o estado de erro do player */ }
      finally { recarregandoUrl = false; }
    }

    (async function init() {
      await PBM.protegerRota();
      // Deep-link a partir do Ciclo: ?legislacao_id= filtra a série daquela lei.
      const legFiltro = new URLSearchParams(location.search).get('legislacao_id');
      try {
        const podcasts = await PBM.Podcasts.listar(legFiltro || undefined);
        if (!podcasts.length) {
          elStatus.textContent = legFiltro
            ? 'Nenhum podcast desta legislação ainda. Volte em breve.'
            : 'Nenhum podcast disponível ainda. Volte em breve.';
          return;
        }
        elStatus.hidden = true;
        render(podcasts);
      } catch (err) {
        elStatus.className = 'aviso erro';
        elStatus.textContent = err?.erro || 'Não foi possível carregar os podcasts.';
      }
    })();
  </script>
</body>
</html>
